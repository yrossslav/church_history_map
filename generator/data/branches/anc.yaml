- id: apost
  title: Апостольская Церковь
  sub: Пятидесятница · ~33
  column: 0
  year: 33
  branch: anc
  info: Церковь, рождённая в день Пятидесятницы (~33 г.); от неё берут начало все церкви и течения христианства. Эпоха гонений,
    отцов и Вселенских соборов.
  sources:
  - sannikov
  - needham3
  edges:
  - to: antenic
    type: solid
    info: Апостольская Церковь прямо продолжается доникейской эпохой отцов и апологетов, развивавших апостольское учение.
  - to: ebion
    type: dash
    label: иудеохристиане
    info: От первохристианской общины ответвились иудеохристиане-евиониты, удержавшие верность Закону Моисееву и отвергшие
      божественность Христа.
  datenote: рождение Церкви в день Пятидесятницы (~33 г.)
- id: antenic
  title: Доникейская Церковь
  sub: отцы · апологеты · гонения
  column: 0
  year: 120
  branch: anc
  info: 'Доникейская Церковь (II–III вв.): эпоха гонений и мучеников, апологетов (Иустин, Тертуллиан) и ранних отцов; формирование
    канона, правила веры и епископата.'
  sources:
  - sannikov
  - schaff6
  - needham3
  edges:
  - to: imperial
    type: solid
    label: 313 · 380
    info: После Миланского эдикта (313) и Феодосия (380) гонимая Церковь становится государственной религией империи.
  - to: monast
    type: solid
    label: аскеза
    info: Из аскетических идеалов ранней Церкви вырастает монашество — организованный уход от мира ради подвига.
  - to: gnostic
    type: dash
    label: ересь · отвергнута
    info: В противостоянии раннецерковному учению о творении и спасении возникает отвергнутый гностицизм с его тайным знанием.
  - to: montan
    type: dash
    label: ересь
    info: Внутри Церкви II века появляется монтанизм с «новым пророчеством», осуждённый как еретическое уклонение.
  - to: donat
    type: dash
    label: раскол
    info: Раскол донатистов вырастает из споров ранней Церкви о чистоте клира и действительности таинств у отступников.
  - to: arian
    type: dash
    label: осуждено в 325
    info: Тринитарные споры доникейской эпохи привели к арианству, осуждённому на Никейском соборе 325 года.
  - to: monarch
    type: dash
    label: II–III вв.
    info: Стремление ранних богословов сохранить строгое единобожие породило антитринитарное монархианство II–III веков.
  datenote: условная веха — расцвет доникейской эпохи отцов и апологетов
- id: monast
  title: Монашество
  sub: Антоний · пустынники Египта
  column: 1
  year: 300
  branch: anc
  info: Монашество (с ~270 — прп. Антоний Великий, затем Пахомий; на Западе — устав прп. Бенедикта) — движение аскезы и ухода
    от мира. Сохраняется в православии и католичестве доныне.
  sources:
  - sannikov
  - schaff6
  - needham3
  edges:
  - to: celtic
    type: dash
    label: монашество
    info: Восточное монашество дало образец кельтскому христианству Ирландии с его монастырским укладом и миссией.
  datenote: условно — становление монашества Антония и Пахомия
- id: imperial
  title: Имперская Церковь
  sub: Феодосий · гос. религия 380
  column: 0
  year: 380
  branch: anc
  info: 'Имперская Церковь: после Миланского эдикта (313) и провозглашения христианства государственной религией при Феодосии
    (380) — эпоха Вселенских соборов и союза Церкви с государством.'
  sources:
  - sannikov
  - schaff6
  - needham3
  edges:
  - to: assyr
    type: dash
    label: Эфесский собор · 431
    info: После осуждения несторианства на Эфесском соборе (431) от имперской Церкви отделилась Ассирийская Церковь Востока.
  - to: orient
    type: dash
    label: Халкидонский собор · 451
    info: После Халкидонского собора (451) от имперской Церкви отделились нехалкидонские (дохалкидонские) Восточные церкви.
  - to: august
    type: solid
    label: отцы Запада
    info: Имперская эпоха выдвинула Августина — величайшего из латинских отцов Запада, оформившего западное богословие.
  - to: antioch
    type: solid
    label: древний престол
    info: Имперская Церковь признаёт Антиохию одним из древних патриарших престолов раннего христианства.
  - to: alex
    type: solid
    label: древний престол
    info: Имперская Церковь признаёт Александрию одним из древних патриарших престолов с авторитетной богословской школой.
  - to: cpole
    type: solid
    label: Вселенский престол
    info: Константинополь возвышается как Вселенский патриарший престол новой столицы империи.
  - to: jerus
    type: solid
    label: Халкидон 451
    info: Иерусалим получает статус самостоятельного патриаршего престола на Халкидонском соборе 451 года.
  - to: celtic
    type: dash
    label: контакт с Римом
    info: Кельтская Церковь вступает в контакт с Римом и имперским христианством, постепенно сближаясь с его обычаями.
  datenote: христианство как госрелигия при Феодосии
- id: august
  title: Августин Иппонский
  sub: учение о благодати
  column: 1
  year: 410
  branch: anc
  info: Августин Иппонский (354–430) — крупнейший западный отец Церкви; его учение о грехе, благодати и предопределении определило
    латинское богословие, а позднее вдохновило Лютера и Кальвина.
  sources:
  - sannikov
  - schaff6
  - mcgrath_thought
  edges:
  - to: pelag
    type: dash
    label: спор о благодати
    info: Августин ведёт спор о благодати с Пелагием, отстаивая необходимость спасающей благодати против его учения.
  datenote: условно — зрелость богословия Августина («О граде Божьем»)

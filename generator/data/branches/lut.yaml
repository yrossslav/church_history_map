- id: lut
  title: Лютер · Меланхтон
  sub: оправдание верой
  column: 1
  year: 1520
  branch: lut
  info: 'Мартин Лютер (1483–1546), сын мансфельдского рудопромышленника, по обету ушёл в августинский монастырь в Эрфурте,
    где мучился неуверенностью в спасении под влиянием неопелагианского богословия via moderna. Духовник Иоганн фон Штаупиц
    направил его к Августину и к кафедре библейской экзегезы в Виттенберге, где при изучении Послания к Римлянам Лютер пережил
    «башенное переживание»: «праведность Божья» в Рим. 1:17 есть не карающая справедливость, а праведность, даром вменяемая
    грешнику по вере (sola fide), через «радостный обмен» Христовой праведности на человеческий грех. 31 октября 1517 года
    он вывесил 95 тезисов против индульгенций Тецеля — академический вызов, который печатный станок превратил в общеевропейское
    событие. На Лейпцигском диспуте 1519 года Лютер признал погрешимость соборов и единственный авторитет Писания, а в трёх
    трактатах 1520 года развил учение о всеобщем священстве верующих и о христианской свободе. Отлучённый буллой и осуждённый
    Вормсским эдиктом 1521 года («На том стою…»), он укрылся в Вартбурге, где перевёл Новый Завет на немецкий, заложив основы
    литературного языка. Ближайшим систематизатором его богословия стал Филипп Меланхтон, автор Аугсбургского исповедания.'
  sources:
  - needham3
  - mcgrath_thought
  - schaff7
  - sannikov
  edges:
  - to: lutc
    type: solid
    info: Богословие Лютера об оправдании верой стало основой возникших евангелическо-лютеранских церквей.
  - to: mel
    type: solid
    info: Меланхтон был ближайшим соратником и систематизатором богословия Лютера, автором Аугсбургского исповедания.
  - to: munz
    type: dash
    label: разрыв с Лютером
    info: Радикальный реформатор Томас Мюнцер порвал с Лютером из-за расхождений о Реформации и социальном перевороте.
  datenote: программные трактаты Лютера (тезисы — 1517, Вормс — 1521)

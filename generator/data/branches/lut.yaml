- id: lutc
  title: 'Евангелическо-

    лютеранские церкви'
  sub: Аугсбург 1530 · Германия, Сканд.
  column: 1
  year: 1530
  branch: lut
  info: 'Евангелическо-лютеранские церкви выросли из движения, которое после Шпейерского рейхстага 1529 года получило имя
    «протестантского», и оформились вокруг Аугсбургского исповедания 1530 года, составленного в умеренном тоне Филиппом Меланхтоном
    (Лютер как отлучённый не мог явиться на рейхстаг). Его IV артикул утверждает, что люди оправдываются не своими силами
    и заслугами, а даром, ради Христа, через веру. Богословски лютеранство держится трёх sola (sola fide, sola gratia, sola
    Scriptura), учения о двух царствах и о реальном телесном присутствии Христа «в, с и под» хлебом и вином, что на Марбургском
    диспуте 1529 года развело лютеран с цвинглианами. Политически движение опиралось на территориальных князей: Шмалькальденский
    союз (1531) защитил его военно, а Аугсбургский религиозный мир 1555 года с принципом cuius regio, eius religio закрепил
    право князя определять веру своей земли. После смерти Лютера внутренние споры были улажены Формулой согласия 1577 года,
    вошедшей в «Книгу согласия». Через государственные церкви Реформация утвердилась в Скандинавии — Дании, Норвегии, Швеции
    и Финляндии. Так лютеранство в значительной мере осталось немецко-скандинавским явлением, тесно связанным со светской
    властью.'
  sources:
  - needham3
  - augsburg
  - schaff7
  - sannikov
  live: true
  edges:
  - to: ierem
    type: dash
    label: диалог с лютеранами
    info: Лютеранские богословы Тюбингена вели догматический диалог с константинопольским патриархом Иеремией II.
  - to: pietism
    type: solid
    info: Пиетизм возник внутри лютеранства как движение обновления, противопоставившее живое благочестие «чистому учению».
  - to: confess
    type: solid
    label: исповедники
    info: Из лютеранских церквей нацистской Германии выросла Исповедническая церковь, противостоявшая огосударствлению.
  - to: deutchr
    type: dash
    label: немецкие христиане
    info: «Немецкие христиане» — пронацистское течение в лютеранстве, пытавшееся подчинить церковь идеологии рейха.
  site: https://lutheranworld.org/
  datenote: Аугсбургское исповедание — основа лютеранства

- id: iez
  title: Орден иезуитов
  sub: Игнатий Лойола · 1540
  column: 16
  year: 1540
  branch: contra
  info: Орден иезуитов («Общество Иисуса», Societas Jesu) — важнейший монашеский орден католической Контрреформации, основанный
    испанским дворянином Игнатием де Лойолой (1491–1556). Военная карьера Лойолы оборвалась в 1521 году, когда ядро раздробило
    ему ногу; в долгом выздоровлении он пережил духовный переворот, читая «Жизнь Христа» Людольфа Саксонского, и систематизировал
    свой опыт в «Духовных упражнениях» — четырёхнедельной программе молитвы, новаторски задействовавшей воображение. Получив
    в Париже степень магистра (1534), он сплотил соратников (среди них Франциск Ксаверий), а в 1540 году папа Павел III официально
    утвердил орден; Лойола стал его первым генералом. Орден строился по военному образцу с абсолютной властью «генерала» и
    особым четвёртым обетом безусловного послушания папе. Тремя направлениями деятельности стали образование (к XVII веку
    около 400 бесплатных коллегий с передовыми методами), борьба с протестантизмом и заморские миссии — от Петра Канизия,
    обратившего вспять Реформацию в Южной Германии, до Франциска Ксаверия, «апостола Индии и Японии».
  sources:
  - needham3
  - simonov
  - trent
  edges:
  - to: trent
    type: solid
    info: Орден иезуитов стал боевым инструментом Контрреформации и опорой Рима на Тридентском соборе.
  site: https://www.jesuits.global/
  datenote: утверждение ордена иезуитов папой Павлом III
- id: trent
  title: Тридентский собор
  sub: 1545–1563
  column: 16
  year: 1545
  branch: contra
  info: 'Тридентский собор (1545–1563) — девятнадцатый вселенский собор Католической церкви и главный инструмент католической
    реформации, созванный папой Павлом III в Триденте после провала примирительного Регенсбургского коллоквиума 1541 года.
    Собор заседал в три этапа (1545–1547, 1551–1552, 1562–1563), а большинство участников составляли итальянцы, что обеспечивало
    контроль римской курии. В ответ на протестантское sola Scriptura собор провозгласил учение о «двух источниках» — равном
    авторитете Писания и неписаного Предания, объявив нормативной Вульгату и включив второканонические книги; декрет об оправдании
    (1547) отверг sola fide, соединив оправдание с освящением. Были подтверждены семь таинств, пресуществление и особое священство
    в противоположность протестантскому всеобщему священству. Третий этап принёс дисциплинарные реформы — обязательные семинарии
    в каждой епархии, резиденцию епископов, запрет симонии. По выражению Нидхэма, «Тридент стал собором уже не Западной, а
    Римско-католической церкви»: систематизировав вероучение и анафематствовав протестантов, он закрепил конфессиональный
    раскол Запада и на четыре столетия задал нормативный тип «тридентского католицизма» вплоть до Второго Ватиканского собора.'
  sources:
  - trent
  - needham3
  - mcgrath_thought
  - simonov
  edges:
  - to: inkv
    type: solid
    info: Решения Тридента дополнялись принудительными средствами — римской инквизицией и «Индексом запрещённых книг».
  - to: catholmod
    type: solid
    label: обновление
    info: Тридентский тип католицизма задал нормативное вероучение вплоть до обновления на II Ватиканском соборе.
  - to: oldcath
    type: solid
    label: после Ватикана I
    info: Отвержение догмата о непогрешимости папы (Ватикан I) породило старокатоликов, отколовшихся от Рима.
  datenote: открытие Тридентского собора
- id: inkv
  title: Римская инквизиция · «Индекс»
  sub: 1542 · 1559
  column: 16
  year: 1559
  branch: contra
  info: Римская инквизиция и «Индекс запрещённых книг» — репрессивные инструменты Контрреформации, дополнившие духовное обновление
    и догматические декреты принудительными средствами. В 1542 году папа Павел III буллой Licet ab initio восстановил римскую
    инквизицию (Конгрегацию Священной канцелярии) по испанскому образцу, чтобы остановить распространение Реформации в Италии,
    Испании и Франции; осуждённых передавали светской власти для сожжения, а одним из главных инквизиторов выступал Джованни
    Пьетро Карафа. Став папой Павлом IV (1555–1559), Карафа ужесточил курс, заявив, что выживание церкви зависит от уничтожения
    протестантов. В 1559 году он издал первый официальный «Индекс запрещённых книг» (Index Librorum Prohibitorum), включивший
    все сочинения Эразма Роттердамского и все переводы Библии на народные языки. Свирепость его понтификата вызвала такую
    ненависть, что после смерти папы римский народ разгромил его статую и сжёг здание инквизиции. Вместе с тем историческое
    равновесие требует видеть в Контрреформации и движение просвещения против народных суеверий и невежества духовенства.
  sources:
  - needham3
  - trent
  - macculloch
  live: true
  datenote: первый «Индекс запрещённых книг» Павла IV

- id: rusb
  title: Крещение Руси
  sub: 988 · кн. Владимир
  column: -1
  year: 988
  branch: rus
  info: Крещение Руси (988) при князе Владимире — христианство принято из Византии.
  sources:
  - sannikov
  - needham3
  edges:
  - to: rusa
    type: solid
    info: Из учреждённой при Крещении Руси митрополии выросла Русская церковь, провозгласившая автокефалию в 1448 году.
  datenote: Крещение Руси при князе Владимире
- id: rusa
  title: Автокефалия Руси
  sub: 1448 · «Третий Рим»
  column: -1
  year: 1448
  branch: rus
  info: Автокефалия Русской церкви (1448) и идея «Москва — Третий Рим».
  sources:
  - sannikov
  - needham3
  edges:
  - to: rusp
    type: solid
    info: Полученная в 1448 году фактическая независимость закрепилась в 1589 году учреждением Московского патриаршества.
  - to: brest
    type: dash
    label: '1596'
    info: На фоне русской автокефалии западнорусские епархии в 1596 году заключили Брестскую унию с Римом.
  datenote: провозглашение автокефалии, идея «Третьего Рима»
- id: rusp
  title: Московское патриаршество
  sub: '1589'
  column: -1
  year: 1589
  branch: rus
  info: 'Учреждение Московского патриаршества в 1589 г.: Константинопольский патриарх Иеремия II возвёл митрополита Московского
    Иова в сан патриарха. Москва стала пятым по чести престолом православного мира — после Константинополя, Александрии, Антиохии
    и Иерусалима, что закрепило самостоятельность Русской церкви.'
  sources:
  - sannikov
  - needham3
  edges:
  - to: rusr
    type: solid
    info: Московское патриаршество институционально продолжилось в Русской Православной Церкви через раскол и синодальный
      период.
  - to: mogila
    type: dash
    label: киевское богословие
    info: Молодое Московское патриаршество богословски опиралось на киевскую учёность митрополита Петра Могилы.
  - to: oldbel
    type: dash
    label: '1666'
    info: Никоновская реформа при патриаршестве привела к расколу 1666 года и выделению старообрядчества.
  datenote: учреждение Московского патриаршества (поставление патр. Иова)
- id: rusr
  title: Русская Православная Церковь
  sub: доныне
  column: -1
  year: 1700
  branch: rus
  info: Русская Православная Церковь (после раскола 1666 г. и синодального периода) — крупнейшая православная церковь, существует
    доныне.
  sources:
  - sannikov
  - needham3
  live: true
  edges:
  - to: ru1917
    type: solid
    label: собор 1917
    info: Русская Православная Церковь на Поместном соборе 1917 года восстановила упразднённое Петром I патриаршество.
  - to: silverage
    type: solid
    label: религ. возрождение
    info: В лоне Русской церкви на рубеже XIX–XX веков началось религиозно-философское возрождение Серебряного века.
  - to: oca
    type: dash
    label: русская миссия
    info: Русская православная миссия в Северной Америке выросла в самостоятельную Православную Церковь в Америке.
  site: https://www.patriarchia.ru/
  datenote: условно — начало синодального периода (РПЦ доныне)
- id: ru1917
  title: Восстановление патриаршества
  sub: Собор 1917 · патр. Тихон
  column: -1
  year: 1917
  branch: rus
  info: Поместный собор 1917–1918 гг. восстановил упразднённое Петром I патриаршество и избрал патриарха Тихона накануне большевистских
    гонений.
  sources:
  - sannikov
  edges:
  - to: rocor
    type: dash
    label: эмиграция
    info: После революции часть духовенства и паствы оказалась в эмиграции и образовала Русскую зарубежную церковь.
  - to: rusovet
    type: solid
    label: гонения
    info: Восстановленное в 1917 году патриаршество сразу столкнулось с массовыми советскими гонениями.
  datenote: Поместный собор восстановил патриаршество (патр. Тихон)
- id: rocor
  title: Зарубежная церковь (РПЦЗ)
  sub: эмиграция · Карловцы
  column: -1
  year: 1921
  branch: rus
  info: Русская православная церковь заграницей (РПЦЗ) — из эмиграции после революции; I Всезарубежный собор в Сремских Карловцах
    (1921), разрыв с Москвой (1927), воссоединение с РПЦ в 2007.
  sources:
  - sannikov
  - pravenc_rocor
  edges:
  - to: catacomb
    type: dash
    label: тайная связь
    info: Зарубежная церковь поддерживала тайную связь с гонимой подпольной Катакомбной церковью внутри СССР.
  site: https://synod.com/
  datenote: I Всезарубежный собор в Сремских Карловцах (РПЦЗ)
- id: rusovet
  title: Советские гонения
  sub: новомученики · 1927
  column: -1
  year: 1927
  branch: rus
  info: 'Эпоха советских гонений на РПЦ: массовые расстрелы и закрытие храмов, новомученики, «Декларация» митр. Сергия (1927)
    о лояльности власти.'
  sources:
  - sannikov
  edges:
  - to: ru1988
    type: solid
    info: Десятилетия гонений сменились возрождением, ознаменованным празднованием 1000-летия Крещения Руси в 1988 году.
  - to: catacomb
    type: solid
    label: раскол после Декларации
    info: «Декларация» митрополита Сергия 1927 года о лояльности власти вызвала уход несогласных в Катакомбную церковь.
  datenote: «Декларация» митр. Сергия о лояльности власти
- id: ru1988
  title: Возрождение 1988
  sub: 1000-летие Крещения Руси
  column: -1
  year: 1988
  branch: rus
  info: Празднование 1000-летия Крещения Руси (1988) и Поместный собор открыли массовое возрождение православия в СССР и России.
  sources:
  - sannikov
  live: true
  datenote: празднование 1000-летия Крещения Руси

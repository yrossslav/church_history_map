- id: silverage
  title: Серебряный век
  sub: религиозная философия
  column: -1
  year: 1878
  branch: rus
  info: Русское религиозно-философское возрождение, начатое Вл. Соловьёвым (всеединство, Богочеловечество, София); его наследники
    — Флоренский, Булгаков, Бердяев, Франк — развили софиологию.
  sources:
  - silverage_pravenc
  edges:
  - to: parisschool
    type: solid
    label: эмигранты-софиологи
    info: Мыслители Серебряного века в эмиграции основали богословский центр — Парижскую школу при Свято-Сергиевском институте.
  - to: rsxd
    type: solid
    label: религ. возрождение
    info: Идеи религиозного возрождения Серебряного века питали Русское студенческое христианское движение в эмиграции.
  datenote: «Чтения о Богочеловечестве» Вл. Соловьёва
- id: parisschool
  title: Парижская школа
  sub: Свято-Сергиевский институт
  column: -2
  year: 1925
  branch: rus
  info: 'Богословский центр русской эмиграции при Свято-Сергиевском институте в Париже (1925): о. Сергий Булгаков развивал
    софиологию, Н. Афанасьев — евхаристическую экклезиологию.'
  sources:
  - serginst_pravenc
  edges:
  - to: neopatr
    type: solid
    label: реакция на софиологию
    info: В Парижской школе как реакция на софиологию Булгакова возник неопатристический синтез Флоровского.
  - to: oca
    type: dash
    label: Шмеман, Мейендорф
    info: Питомцы Парижской школы Шмеман и Мейендорф перенесли её богословие в Православную Церковь в Америке.
  datenote: основание Свято-Сергиевского института в Париже
- id: rsxd
  title: РСХД
  sub: студенческое движение
  column: -3
  year: 1923
  branch: rus
  info: 'Русское студенческое христианское движение (Пшеров, 1923): объединение православной молодёжи эмиграции, лозунг «оцерковление
    жизни», издательство YMCA-Press, журнал «Путь».'
  sources:
  - rsxd_pravenc
  edges:
  - to: parisschool
    type: dash
    label: основали институт
    info: Деятели РСХД участвовали в создании Свято-Сергиевского института — центра Парижской богословской школы.
  datenote: учредительный съезд РСХД в Пшерове
- id: neopatr
  title: Неопатристический синтез
  sub: «вперёд к отцам»
  column: -3
  year: 1936
  branch: rus
  info: Программа богословия Г. Флоровского («вперёд к отцам», Афины 1936) как ответ-альтернатива софиологии Булгакова; призыв
    к «христианскому эллинизму», родственно богословию В. Лосского.
  sources:
  - neopatr_pravenc
  edges:
  - to: oca
    type: dash
    label: богословие отцов
    info: Неопатристическое богословие отцов через Мейендорфа и Шмемана определило традицию OCA.
  datenote: программа Флоровского «вперёд к отцам» (Афины)
- id: oca
  title: Православие в Америке
  sub: OCA · автокефалия 1970
  column: -2
  year: 1970
  branch: eorth
  info: 'Православная Церковь в Америке (OCA): русская миссия получила автокефалию от Москвы в 1970; литургическое богословие
    о. Александра Шмемана и о. Иоанна Мейендорфа.'
  sources:
  - oca_pravenc
  site: https://www.oca.org/
  datenote: автокефалия Православной Церкви в Америке от Москвы
- id: catacomb
  title: Катакомбная церковь
  sub: новомученики, ИПЦ
  column: -4
  year: 1928
  branch: rus
  info: 'Движение несогласных с Декларацией митр. Сергия (1927): «непоминающие», иосифляне, Истинно-православная (катакомбная)
    церковь; среди новомучеников митр. Кирилл (Смирнов) и Иосиф (Петровых).'
  sources:
  - catacomb_pravenc
  - declaration_pravenc
  datenote: уход «непоминающих» в подполье после Декларации
- id: popovtsy
  title: Поповцы
  sub: Белокриницкая иерархия
  column: -4
  year: 1846
  branch: eorth
  info: Старообрядцы, приемлющие священство; в 1846 г. митр. Амвросий перешёл в старообрядчество и основал Белокриницкую (Австрийскую)
    иерархию. Ныне — Русская православная старообрядческая церковь (РПСЦ).
  sources:
  - pravenc_belokrin
  site: https://rpsc.ru/
  datenote: переход митр. Амвросия — Белокриницкая иерархия
- id: bespopovtsy
  title: Беспоповцы
  sub: без священства
  column: -4
  year: 1694
  branch: eorth
  info: Старообрядцы, отвергшие законное священство после раскола; ядро — Выговское общежительство (1694) на Поморье, давшее
    поморское согласие. Позже разделились на федосеевцев, филипповцев, странников.
  sources:
  - pravenc_bespopovtsy
  - pravenc_vygolex
  datenote: основание Выговского общежительства поморцев
- id: edinoverie
  title: Единоверие
  sub: в единстве с РПЦ
  column: -4
  year: 1800
  branch: eorth
  info: 'Учреждено указом Павла I и правилами митр. Платона (1800): сохранение дониконовских обрядов при подчинении синодальной
    иерархии — компромисс части ревнителей «старой веры» с Церковью.'
  sources:
  - sannikov
  datenote: учреждение единоверия указом Павла I
- id: paisii
  title: Движение Добротолюбия
  sub: возрождение умного делания
  column: -2
  year: 1763
  branch: eorth
  info: Прп. Паисий Величковский собрал учеников на Афоне и в Молдавии, перевёл на славянский «Добротолюбие» и возродил исихастскую
    традицию умной молитвы (изд. 1793); «отец русского старчества».
  sources:
  - pravenc_paisii
  edges:
  - to: optina
    type: solid
    label: ученики паисиевой школы
    info: Ученики возрождённой Паисием школы умного делания принесли старчество в Оптину пустынь.
  - to: glinsk
    type: solid
    label: старческая традиция
    info: Старческая исихастская традиция, возрождённая Паисием, утвердилась и в Глинской пустыни.
  datenote: условно — Паисий Величковский возрождает умное делание
- id: optina
  title: Оптинское старчество
  sub: духовный центр XIX в.
  column: -2
  year: 1829
  branch: eorth
  info: Старчество в Оптиной пустыни (с 1829, старец Лев) служило не только братии, но всему народу; старцы Лев, Макарий,
    Амвросий влияли на русскую культуру (Достоевский, Гоголь, К. Леонтьев).
  sources:
  - pravenc_optina
  datenote: начало старчества в Оптиной пустыни (старец Лев)
- id: glinsk
  title: Глинское старчество
  sub: школа духовной жизни
  column: -1
  year: 1817
  branch: eorth
  info: Глинская пустынь в XIX – нач. XX в. — один из крупнейших центров возрождённого старчества; традиция распространилась
    отсюда на десятки монастырей Российской империи.
  sources:
  - pravenc_glinsk
  datenote: настоятельство Филарета — афонский устав и старчество

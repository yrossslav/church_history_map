- id: awakening
  title: Великие пробуждения
  sub: Эдвардс · Уайтфилд
  column: 10
  year: 1740
  branch: pent
  info: '«Великие пробуждения» (XVIII в.: Дж. Эдвардс, Дж. Уайтфилд, братья Уэсли) — волна массовых евангельских пробуждений
    в Британии и Северной Америке; родина ревивалистской традиции (Финней, Муди, Грэм).'
  sources:
  - sannikov
  - needham4
  edges:
  - to: evangelical
    type: solid
    info: Великие пробуждения породили ревивалистскую традицию, из которой выросло современное евангельское движение.
  - to: advent
    type: solid
    label: миллеризм
    info: Пробужденческая среда США через миллеризм 1840-х породила адвентистское движение.
  - to: missions
    type: solid
    label: страсть к миссии
    info: Пробуждения зажгли страсть к миссии, давшую толчок протестантскому миссионерскому движению.
  - to: mormon
    type: dash
    label: среда США
    info: Пробужденческая религиозная среда США стала почвой, на которой возникло мормонство.
  - to: christsci
    type: dash
    label: пробужденч. среда
    info: Та же пробужденческая атмосфера США способствовала появлению «Христианской науки».
  datenote: волна Великих пробуждений Эдвардса и Уайтфилда
- id: brethren
  title: Плимутские братья
  sub: Дарби · диспенсационализм
  column: 12
  year: 1831
  branch: pent
  info: Плимутские братья (Дж. Н. Дарби, с 1831) — движение «братьев» без обрядов и духовенства, с авторитетом Библии; родина
    диспенсационалистской эсхатологии. Через лорда Редстока повлияли на петербургское пробуждение.
  sources:
  - sannikov
  - needham4
  live: true
  edges:
  - to: pashkov
    type: dash
    label: влияние Редстока
    info: Плимутские братья через лорда Редстока повлияли на петербургское пробуждение Пашкова.
  - to: fundament
    type: dash
    label: диспенсационализм
    info: Диспенсационализм Дж. Н. Дарби через «Учебную Библию Скоуфилда» и библейские конференции лёг в основу американского
      фундаментализма.
  site: https://www.plymouthbrethrenchristianchurch.org/
  datenote: начало движения Плимутских братьев Дарби
- id: evangelical
  title: Евангельское движение
  sub: евангеликализм · Грэм
  column: 9
  year: 1846
  branch: pent
  info: Современное евангельское движение (евангеликализм) — межденоминационное течение вокруг личного обращения, авторитета
    Библии и активного благовестия; кампании Билли Грэма, Лозаннское движение.
  sources:
  - sannikov
  - needham4
  edges:
  - to: fundament
    type: solid
    info: Из евангельского движения выросла фундаменталистская защита «основ» веры против либерализма.
  - to: restor
    type: dash
    info: Евангеликализм соприкасается с реставрационистскими движениями, стремящимися восстановить «истинную» раннюю церковь.
  - to: globalsouth
    type: dash
    label: Лозанна → Юг
    info: Евангеликализм через Лозаннское движение (1974) дал импульс росту евангельских церквей Глобального Юга.
  site: https://lausanne.org/
  datenote: основание Евангельского альянса в Лондоне
- id: advent
  title: Адвентисты
  sub: Миллер · Е. Уайт · суббота
  column: 6
  year: 1863
  branch: pent
  info: 'Адвентисты — откол от евангельского протестантизма после «великого разочарования» 1844 г. (У. Миллер); Церковь адвентистов
    седьмого дня (1863): суббота, «небесное святилище», видения Е. Уайт.'
  sources:
  - sannikov
  - needham4
  live: true
  edges:
  - to: jw
    type: dash
    label: милл. хронология
    info: Адвентистская миллеристская хронология конца времён повлияла на формирование «Свидетелей Иеговы».
  site: https://adventist.org/
  datenote: организация Церкви адвентистов седьмого дня
- id: holiness
  title: Движение святости
  sub: Holiness · освящение
  column: 8
  year: 1867
  branch: pent
  info: Движение святости (Holiness, США, XIX в.) — выросшее из методизма учение о «втором благословении» и мгновенном освящении;
    прямой предшественник пятидесятничества.
  sources:
  - sannikov
  - needham4
  edges:
  - to: pentecost
    type: solid
    label: крещение Духом
    info: Учение святости о «втором благословении» и крещении Духом стало прямым предшественником пятидесятничества.
  site: https://nazarene.org/
  datenote: условно — расцвет движения святости в США
- id: pentecost
  title: Пятидесятничество
  sub: Азуза-стрит · 1906
  column: 11
  year: 1906
  branch: pent
  info: Пятидесятничество (после пробуждения на Азуза-стрит, 1906) — «крещение Духом» с глоссолалией; самая быстрорастущая
    ветвь современного христианства (Ассамблеи Бога и др.).
  sources:
  - sannikov
  - needham4
  wide:
  - 11
  - 13
  edges:
  - to: charism
    type: solid
    info: Пятидесятнический опыт даров Духа перешёл в исторические церкви, породив харизматическое движение.
  - to: globalsouth
    type: dash
    label: рост на Юге
    info: Пятидесятничество стало двигателем бурного роста христианства на Глобальном Юге.
  - to: ruspent
    type: solid
    label: Воронаев 1921
    info: Пятидесятничество пришло в Россию с миссией Ивана Воронаева в 1921 году.
  - to: lapent
    type: solid
    label: Лат. Америка
    info: Пятидесятничество широко распространилось в Латинской Америке, став массовым движением.
  - to: afpent
    type: solid
    label: Африка
    info: Пятидесятничество бурно разрослось в Африке, образовав крупные местные церкви.
  - to: koreapent
    type: solid
    label: Корея
    info: Пятидесятничество получило мощное развитие в Корее с её крупнейшими общинами мира.
  - to: prosperity
    type: solid
    label: исцеление/процветание
    info: Из пятидесятнического акцента на исцелении выросло «евангелие процветания» и движение веры.
  site: https://worldagfellowship.org/
  datenote: пробуждение на Азуза-стрит
- id: fundament
  title: Фундаментализм
  sub: защита «основ» веры
  column: 10
  year: 1910
  branch: pent
  info: Фундаментализм (нач. XX в.) — консервативная протестантская реакция на богословский либерализм, отстаивавшая «фундаментальные»
    доктрины (богодухновенность Писания, чудеса, телесное воскресение).
  sources:
  - sannikov
  - needham4
  live: true
  datenote: складывание протестантского фундаментализма
- id: ruspent
  title: Пятидесятники в России
  sub: И. Воронаев · 1921
  column: 15
  year: 1921
  branch: pent
  info: Пятидесятничество в России — с миссии И. Е. Воронаева (1921, Одесса); крупное движение, частью вошедшее во ВСЕХБ,
    частью оставшееся незарегистрированным.
  sources:
  - sannikov
  - savinsky
  live: true
  edges:
  - to: vse
    type: dash
    label: влились во ВСЕХБ
    info: Часть российских пятидесятников влилась во Всесоюзный совет евангельских христиан-баптистов (ВСЕХБ).
  site: https://cef.ru/
  datenote: прибытие Воронаева в Одессу — русское пятидесятничество
- id: charism
  title: Харизматическое движение
  sub: дары Духа в церквах
  column: 13
  year: 1960
  branch: pent
  info: 'Харизматическое движение (с ~1960) — перенос пятидесятнического опыта даров Духа внутрь исторических церквей: англикан,
    лютеран, католиков (с 1967), отчасти православных.'
  sources:
  - sannikov
  - needham4
  live: true
  edges:
  - to: thirdwave
    type: solid
    label: третья волна
    info: Из харизматического движения выросла «третья волна» неохаризматических независимых общин.
  - to: prosperity
    type: dash
    label: взаимопроникновение
    info: Харизматическое движение и движение веры взаимно проникали друг в друга, обмениваясь акцентами.
  site: https://www.charis.international/en/
  datenote: начало харизматического движения в исторических церквах
- id: globalsouth
  title: Христианство Юга
  sub: Африка · Азия · Лат. Америка
  column: 12
  year: 1980
  branch: pent
  info: Христианство Глобального Юга — смещение центра тяжести христианства в XX–XXI вв. в Африку, Азию и Латинскую Америку
    с бурным ростом евангельских и пятидесятническо-харизматических церквей.
  sources:
  - sannikov
  live: true
  datenote: условно — смещение центра христианства на Глобальный Юг
- id: thirdwave
  title: «Третья волна»
  sub: неохаризматическое движение
  column: 13
  year: 1980
  branch: pent
  info: 'С начала 1980-х: П. Вагнер и Дж. Уимбер (Ассоциация церквей «Виноградник»/Vineyard, 1982) развивают независимые харизматические
    общины вне классических пятидесятнических деноминаций, с акцентом на «знамения и чудеса».'
  sources:
  - azbyka_pent
  live: true
  site: https://vineyardusa.org/
  datenote: начало «третьей волны», основание «Виноградника»
- id: prosperity
  title: Движение веры
  sub: евангелие процветания
  column: 11
  year: 1974
  branch: pent
  info: '«Слово веры» (Word of Faith): богословие, восходящее к Э. У. Кеньону и развитое К. Хейгином (центр «Рема», 1974);
    учение об исповедании веры, исцелении и материальном благополучии, ставшее транснациональным, особенно на Глобальном Юге.'
  sources:
  - azbyka_pent
  - ruwiki_vera
  live: true
  datenote: основание Хейгином центра «Рема» (движение веры)

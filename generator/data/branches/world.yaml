- id: missions
  title: Эпоха миссий
  sub: Великий век протестантизма
  column: 17
  year: 1792
  branch: pent
  info: Движение зарубежных протестантских миссий, начатое Уильямом Кэри («Баптистское миссионерское общество», 1792). Сделало
    миссию профессиональным служением и породило массовое создание миссионерских обществ XIX в.
  sources:
  - sannikov
  edges:
  - to: lms
    type: solid
    label: пример Кэри
    info: Пример Уильяма Кэри вдохновил создание в 1795 году межденоминационного Лондонского миссионерского общества.
  - to: biblesoc
    type: solid
    label: перевод Библии
    info: Миссионерское движение породило библейские общества, переводившие и распространявшие Писание по всему миру.
  - to: cim
    type: solid
    label: вера-миссия
    info: Из миссионерского движения выросла «вера-миссия» Хадсона Тейлора — Китайская внутренняя миссия 1865 года.
  - to: studvol
    type: solid
    info: Эпоха миссий породила Студенческое движение добровольцев, давшее половину миссионеров начала XX века.
  - to: ymca
    type: dash
    info: Миссионерское движение было связано с молодёжными ассоциациями YMCA/YWCA и межцерковным благовестием.
  - to: paramiss
    type: solid
    info: Миссионерская эпоха дала начало внеконфессиональным парацерковным организациям XX века.
  - to: afmiss
    type: solid
    label: Африка
    info: Миссионерское движение направило протестантских миссионеров в Африку южнее Сахары в XIX веке.
  - to: chinaprot
    type: solid
    label: Китай
    info: Миссионерское движение принесло протестантизм в Китай, начиная с Роберта Моррисона в 1807 году.
  - to: indiaprot
    type: solid
    label: Серампур
    info: Миссионерское движение принесло протестантизм в Индию через Уильяма Кэри и центр в Серампуре.
  - to: korea
    type: solid
    label: Корея 1885
    info: Миссионерское движение принесло протестантизм в Корею в 1885 году, где он стремительно вырос.
  - to: japan
    type: solid
    label: Япония
    info: Миссионерское движение принесло протестантизм в Японию с середины XIX века.
  - to: cms
    type: solid
    label: англиканское крыло
    info: От миссионерского движения отошло англиканское крыло — Церковное миссионерское общество 1799 года.
  - to: abcfm
    type: solid
    label: миссия США
    info: Миссионерское движение породило в США первое общество зарубежных миссий ABCFM в 1810 году.
  - to: basel
    type: solid
    label: континент. ветвь
    info: Миссионерское движение дало континентальную ветвь — немецко-швейцарскую Базельскую миссию 1815 года.
  - to: wycliffe
    type: dash
    label: перевод Писания
    info: Дело миссий продолжили Уиклифовские переводчики, переводившие Писание на бесписьменные языки.
  datenote: Уильям Кэри основал Баптистское миссионерское общество
- id: moravmiss
  title: Моравские миссии
  sub: гернгутеры-первопроходцы
  column: 17
  year: 1732
  branch: eng
  info: Моравская церковь (гернгутеры) под руководством Цинцендорфа первой среди общин отправила миссионеров в Вест-Индию,
    Гренландию, Африку и Индию — предтеча современного миссионерства.
  sources:
  - sannikov
  edges:
  - to: missions
    type: dash
    label: предтеча
    info: Моравские миссии гернгутеров стали предтечей и образцом для современного протестантского миссионерства.
  site: https://unitasfratrum.org/
  datenote: гернгутеры Цинцендорфа отправили первых миссионеров
- id: lms
  title: Лондонское миссионерское общество
  sub: межцерковное · 1795
  column: 17
  year: 1795
  branch: pent
  info: Основанное в 1795 г. межденоминационное миссионерское общество; образец для обществ в Шотландии, Нидерландах, Германии
    и США.
  sources:
  - sannikov
  site: https://www.cwmission.org/
  datenote: основание Лондонского миссионерского общества
- id: biblesoc
  title: Библейские общества
  sub: перевод Писания
  column: 17
  year: 1804
  branch: pent
  info: «Британское и иностранное Библейское общество» (1804) и подобные общества переводили и распространяли Библию по миру
    на сотнях языков.
  sources:
  - sannikov
  edges:
  - to: wycliffe
    type: dash
    label: дело перевода
    info: Дело перевода Библии библейскими обществами продолжили Уиклифовские переводчики.
  site: https://unitedbiblesocieties.org/
  datenote: основание Британского и иностранного библейского общества
- id: cim
  title: Китайская внутренняя миссия
  sub: вера-миссия Тейлора
  column: 18
  year: 1865
  branch: pent
  info: Основанная Хадсоном Тейлором межконфессиональная «вера-миссия», работавшая во внутреннем Китае с руководством на месте;
    к концу XIX в. крупнейшая миссия мира.
  sources:
  - sannikov
  edges:
  - to: faithmiss
    type: solid
    label: модель «жизни верой»
    info: Китайская внутренняя миссия Тейлора задала модель «жизни верой», породившую движение вера-миссий.
  site: https://omf.org/
  datenote: Хадсон Тейлор основал Китайскую внутреннюю миссию
- id: ymca
  title: YMCA / YWCA
  sub: студенческие ассоциации
  column: 19
  year: 1844
  branch: pent
  info: Христианские ассоциации молодёжи (YMCA, 1844) и девушек (YWCA, 1855), объединившиеся в 1895 г. во Всемирную студенческую
    христианскую ассоциацию; межцерковное благовестие.
  sources:
  - sannikov
  edges:
  - to: wscf
    type: dash
    label: студ. ассоциации
    info: Студенческие ассоциации YMCA/YWCA влились во Всемирную студенческую христианскую федерацию.
  site: https://www.ymca.int/
  datenote: основание YMCA в Лондоне
- id: studvol
  title: Студенческое движение
  sub: добровольцы миссий
  column: 19
  year: 1886
  branch: pent
  info: Движение студентов-добровольцев (с 1886, оформлено Дж. Моттом в 1888) дало половину протестантских миссионеров начала
    XX в. под девизом евангелизации мира в одном поколении.
  sources:
  - sannikov
  edges:
  - to: wscf
    type: solid
    label: студ. корни
    info: Студенческое движение добровольцев стало одним из корней Всемирной студенческой христианской федерации.
  datenote: возникновение Движения студентов-добровольцев
- id: paramiss
  title: Парацерковные миссии
  sub: внеконфессиональные
  column: 17
  year: 1898
  branch: pent
  info: Внеконфессиональные миссионерские и евангелизационные организации XX в. (Гедеоновы братья 1898, «Молодёжь за Христа»,
    «Навигаторы»), действующие автономно от деноминаций.
  sources:
  - sannikov
  site: https://gideons.org/
  datenote: условно — основание «Гедеоновых братьев»
- id: lacath
  title: Католичество конкисты
  sub: иберийская колонизация
  column: 16
  year: 1500
  branch: contra
  info: Испано-португальское католичество, насаждённое конкистой с конца XV–XVI вв.; доминиканцы и францисканцы крестили индейцев,
    Лас-Касас защищал их. К XX в. свыше 90% латиноамериканцев номинально христиане.
  sources:
  - sannikov
  edges:
  - to: lapopcath
    type: solid
    label: народный синкретизм
    info: Католичество конкисты породило народный синкретизм — массовое поверхностное католичество коренного населения.
  datenote: условно — насаждение католичества конкистой
- id: lapopcath
  title: Народное католичество
  sub: лат-амер. синкретизм
  column: 16
  year: 1600
  branch: contra
  info: Массовое народное католичество Латинской Америки, сложившееся после крещения и смешения коренного населения; формально
    католическое, с минимальным знанием веры — поле повторной евангелизации XX в.
  sources:
  - sannikov
  edges:
  - to: lapent
    type: dash
    label: переход католиков
    info: Из номинально католического населения происходил массовый переход верующих в латиноамериканское пятидесятничество.
  datenote: условно — сложение народного католичества
- id: libtheo
  title: Теология освобождения
  sub: церковь на стороне бедных
  column: 20
  year: 1968
  branch: contra
  info: 'Богословское течение Латинской Америки 2-й пол. XX в. (конференция СЕЛАМ в Медельине, 1968; Г. Гутьеррес): осмысление
    христианской вести через борьбу с социальным неравенством, с влиянием марксизма.'
  sources:
  - sannikov
  - pravenc_libtheo
  datenote: конференция СЕЛАМ в Медельине — теология освобождения
- id: lapent
  title: Лат-амер. пятидесятничество
  sub: взрывной рост
  column: 20
  year: 1910
  branch: pent
  info: Латиноамериканское пятидесятничество и неопятидесятничество, охватившее с начала XX в. номинально католическое население;
    одни из крупнейших общин мира.
  sources:
  - sannikov
  - pravenc_pent
  datenote: условно — начало латиноамериканского пятидесятничества
- id: afmiss
  title: Африканские миссии
  sub: протест. миссии XIX в.
  column: 21
  year: 1816
  branch: pent
  info: Протестантские миссии в Африке южнее Сахары начала–середины XIX в. (Моффат, Ливингстон, Слессор) на фоне колониализма;
    заложили основу того, что Африка стала более христианским континентом, чем Европа.
  sources:
  - sannikov
  edges:
  - to: aic
    type: solid
    label: африканизация
    info: Реакцией на «белое» миссионерское христианство стала африканизация — туземные Африканские независимые церкви.
  datenote: условно — протестантские миссии в Африке южнее Сахары
- id: aic
  title: Африканские независимые церкви
  sub: афрохристианство
  column: 21
  year: 1884
  branch: pent
  info: Туземные африканские церкви как реакция на «белое» миссионерское христианство (первая — Н. Тиле, 1884, Капская колония);
    расцвет в 1-й пол. XX в. (кимбангизм, Аладура, сионские церкви).
  sources:
  - sannikov
  - pravenc_aic
  edges:
  - to: afpent
    type: dash
    label: местная почва
    info: Африканские независимые церкви создали местную почву для роста африканского пятидесятничества.
  datenote: первая независимая церковь Н. Тиле (Капская колония)
- id: afpent
  title: Африканский протестантизм
  sub: пятидесятнический рост
  column: 21
  year: 1970
  branch: pent
  info: Современный африканский протестантизм и пятидесятничество, демонстрирующие взрывной рост во 2-й пол. XX – нач. XXI
    вв.; по числу евангельских церквей Африка опережает Европу.
  sources:
  - sannikov
  - pravenc_pent
  datenote: условно — расцвет африканского пятидесятничества
- id: chinaprot
  title: Протестанты Китая
  sub: миссии XIX в.
  column: 22
  year: 1807
  branch: bap
  info: 'Протестантские миссии в Китае: Роберт Моррисон (с 1807), Карл Гютцлафф, Хадсон Тейлор и его «Китайская внутренняя
    миссия» (1865), действовавшие в условиях гонений.'
  sources:
  - sannikov
  - pravenc_china
  edges:
  - to: china3self
    type: solid
    label: огосударствление 1954
    info: Китайский протестантизм был огосударствлён в 1954 году через патриотический комитет «Три-Сам».
  - to: chinahouse
    type: dash
    label: уход в подполье
    info: Часть китайских протестантов ушла в подполье, образовав незарегистрированные домашние церкви.
  datenote: прибытие Роберта Моррисона в Китай
- id: china3self
  title: «Три-Сам»
  sub: патриотическая церковь
  column: 22
  year: 1954
  branch: bap
  info: Зарегистрированный государством «Комитет китайского протестантского движения за три самостоятельности» (самоуправление,
    самофинансирование, самораспространение).
  sources:
  - sannikov
  - pravenc_china
  site: https://en.ccctspm.org/
  datenote: создание патриотического движения «Три-Сам»
- id: chinahouse
  title: Домашние церкви
  sub: незарегистрированные
  column: 22
  year: 1960
  branch: pent
  info: Неофициальные «домашние церкви» Китая, не вошедшие в государственные структуры; растут вне регистрации, во многом
    харизматическо-евангельские.
  sources:
  - sannikov
  - pravenc_china
  datenote: условно — рост незарегистрированных домашних церквей
- id: indiaprot
  title: Миссии в Индии
  sub: Кэри · Серампур
  column: 23
  year: 1793
  branch: bap
  info: 'Протестантские миссии в Индии: Уильям Кэри («отец современных миссий»), первая баптистская церковь и переводческо-миссионерский

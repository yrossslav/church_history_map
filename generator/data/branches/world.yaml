  sources:
  - sannikov
  - pravenc_korea
  site: https://english.fgtv.com/
  datenote: основание церкви Йонги Чо (корейские «Ассамблеи Бога»)
  edges:
  - to: thirdwave
    type: dash
    label: Йонги Чо · 3-я волна
    info: Йонги Чо (Сеул) — один из основателей «третьей волны» неохаризматического движения.
- id: cms
  title: Церковное миссионерское общество
  sub: англиканское · 1799
  column: 18
  year: 1799
  branch: eng
  info: Основано в Лондоне евангельским духовенством Англиканской церкви (1799) как Общество миссий в Африке и на Востоке;
    крупнейшее англиканское миссионерское общество с упором на личное обращение.
  sources:
  - eb_cms
  - sannikov
  site: https://churchmissionsociety.org/
  datenote: основание Церковного миссионерского общества (англикане)
- id: abcfm
  title: Американский совет миссий
  sub: первая миссия США · 1810
  column: 18
  year: 1810
  branch: pent
  info: Первое американское общество зарубежных миссий (1810), созданное конгрегационалистами Новой Англии; открыло американским
    церквам зарубежное поле (Адонирам Джадсон) и стало образцом для деноминационных миссий.
  sources:
  - sannikov
  - eb_abcfm
  site: https://www.globalministries.org/
  datenote: основание ABCFM — первого общества зарубежных миссий США
- id: basel
  title: Базельская миссия
  sub: континентальная · 1815
  column: 18

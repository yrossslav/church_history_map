  sources:
  - sannikov
  - pravenc_india
  edges:
  - to: csi
    type: solid
    label: объединение 1947
    info: Протестантские общины юга Индии объединились в 1947 году в Церковь Южной Индии.
  - to: cni
    type: solid
    label: объединение 1970
    info: Протестантские общины севера Индии объединились в 1970 году в Церковь Северной Индии.
  datenote: прибытие Уильяма Кэри в Индию (Серампур)
- id: csi
  title: Церковь Юж. Индии
  sub: объединённая · 1947
  column: 23
  year: 1947
  branch: eng
  info: 'Объединённая Церковь Южной Индии (CSI, 1947): слияние англиканских, пресвитерианских, методистских и конгрегационалистских
    общин юга Индии.'
  sources:
  - sannikov
  - pravenc_india
  site: https://www.csi1947.com/
  datenote: объединение в Церковь Южной Индии
- id: cni
  title: Церковь Сев. Индии
  sub: объединённая · 1970
  column: 23
  year: 1970
  branch: eng
  info: 'Объединённая Церковь Северной Индии (CNI, 1970): аналогичное межденоминационное объединение протестантов севера страны.'
  sources:
  - sannikov
  - pravenc_india
  site: https://cnisynod.org/
  datenote: объединение в Церковь Северной Индии
- id: japan
  title: Протестанты Японии
  sub: после гонений
  column: 23
  year: 1859
  branch: eng
  info: Протестантские миссии в Японии с середины XIX в. (после изгнания католиков в XVII в.); христианство остаётся религией
    меньшинства.
  sources:
  - sannikov
  - azbyka_japan
  datenote: открытие Японии и начало протестантских миссий
- id: korea
  title: Протестанты Кореи
  sub: взрывной рост
  column: 24
  year: 1885
  branch: pent
  info: Протестантизм в Корее с 1885 г.; стремительный рост (до ~22–35% населения), крупные пресвитерианские, методистские
    и пятидесятнические церкви.
  sources:
  - sannikov
  - pravenc_korea
  edges:
  - to: koreapent
    type: dash
    label: пятидесятнический сегмент
    info: Внутри корейского протестантизма выделился крупный пятидесятнический сегмент с огромными общинами.
  datenote: прибытие первых протестантских миссионеров в Корею
- id: koreapent
  title: Пятидесятники Кореи
  sub: крупнейшие общины мира
  column: 24
  year: 1958
  branch: pent
  info: 'Корейское пятидесятничество: «Ассамблеи Бога» и церковь Йонги Чо в Сеуле (Yoido Full Gospel) — крупнейшая община

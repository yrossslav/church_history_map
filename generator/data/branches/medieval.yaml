- id: manich
  title: Манихейство
  sub: дуализм Мани
  column: 2
  year: 240
  branch: ext
  info: 'Дуалистическая религия, основанная Мани (III в., Персия): свет и дух против тьмы и материи; распространилась от Африки
    до Китая. Крупный соперник Церкви, через который около десяти лет прошёл молодой Августин.'
  sources:
  - manich_pravenc
  datenote: условно — рождение манихейства Мани в Персии
  edges:
  - to: august
    type: dash
    label: молодой Августин — манихей
    info: Около десяти лет Августин был слушателем-манихеем; борьба с манихейством сформировала его учение о зле и благодати.
- id: celtic
  title: Кельтское христианство
  sub: ирландско-британское монашество
  column: 1
  year: 450
  branch: root
  info: 'Особая традиция Ирландии и Британии (V–VII вв.): монастыри как центры церковной жизни, учёность и странствующие миссионеры
    (Патрик, Колумба, Колумбан); отличалась от Рима датой Пасхи и тонзурой, подчинилась римскому обряду после синода в Уитби
    (664).'
  sources:
  - celtic_wiki
  edges:
  - to: missiongerm
    type: solid
    label: миссионеры на континент
    info: Ирландские странствующие монахи понесли христианство на континент, дав начало миссии к языческим германцам.
  datenote: условно — миссия Патрика, расцвет кельтского монашества
- id: missiongerm
  title: Миссия к германцам
  sub: Бонифаций · VIII в.
  column: 0
  year: 720
  branch: root
  info: Англосаксонская и ирландская миссия к языческим германцам (VII–VIII вв.); вершина — деятельность Бонифация («апостол
    Германии»), организовавшего епархии и монастыри и связавшего германскую церковь с Римом.
  sources:
  - bonifac_azbyka
  datenote: условно — миссия Бонифация к германцам
- id: carol
  title: Каролингское возрождение
  sub: церковно-культурная реформа
  column: 1
  year: 780
  branch: root
  info: 'Подъём образования и церковной жизни при Карле Великом и Алкуине (VIII–IX вв.): дворцовая академия, школы при монастырях,
    исправление текстов, каролингский минускул; усиление союза Франкской державы и папства.'
  sources:
  - sannikov
  datenote: условно — Каролингское возрождение при Карле Великом
- id: beguine
  title: Бегинки и бегарды
  sub: полумонашеские общины мирян
  column: 3
  year: 1180
  branch: root
  info: Возникшее в конце XII в. в Льеже движение «святых женщин», живших сообща в бегинажах без орденских обетов (труд, благочестие,
    благотворительность); мужская ветвь — бегарды. Не раз обвинялось в ереси (Вьеннский собор 1311–1314).
  sources:
  - pravenc_beguine
  edges:
  - to: devmod
    type: dash
    label: общины мирян
    info: Традиция мирянских общин бегинок предвосхитила и питала общины Братьев общей жизни движения Devotio moderna.
  datenote: условно — зарождение движения бегинок в Льеже
- id: rhinemyst
  title: Рейнская мистика
  sub: спекулятивная мистика XIV в.
  column: 4
  year: 1300
  branch: root
  info: 'Позднесредневековое мистическое движение в доминиканской среде Германии (Майстер Экхарт, его ученики Таулер и Сузо):
    прямое единение души с Богом и «рождение Бога в душе»; круг «Друзей Божьих», повлияло на Лютера.'
  sources:
  - britannica_tauler
  edges:
  - to: flemmyst
    type: solid
    label: спекулятивная мистика
    info: Немецкая спекулятивная мистика Экхарта передала свой созерцательный импульс фламандской мистике Рёйсбрука.
  datenote: условно — расцвет рейнской мистики Экхарта
- id: flemmyst
  title: Фламандская мистика
  sub: Ян ван Рёйсбрук
  column: 4
  year: 1340
  branch: root
  info: 'Брабантская созерцательная мистика Яна ван Рёйсбрука (приор монастыря Грунендал): учение о встречном движении Бога
    и души («Одеяние духовного брака»); напрямую повлияла на Грооте и Devotio moderna.'
  sources:
  - pravenc_devmod
  edges:
  - to: devmod
    type: solid
    label: влияние Рёйсбрука
    info: Созерцательное учение Рёйсбрука напрямую повлияло на Герта Грооте и зарождение Devotio moderna.
  datenote: условно — деятельность Рёйсбрука
- id: devmod
  title: Devotio moderna
  sub: новое благочестие
  column: 3
  year: 1374
  branch: root
  info: '«Новое благочестие» — движение, начатое Гертом Грооте в Девентере (1374): общины братьев и сестёр общей жизни и Виндесхеймская
    конгрегация; призыв к подражанию Христу, внутреннему благочестию и труду; питало школы и книжность.'
  sources:
  - pravenc_devmod
  edges:
  - to: kempis
    type: solid
    label: новое благочестие
    info: «Новое благочестие» Devotio moderna породило свою вершину — «О подражании Христу» Фомы Кемпийского.
  datenote: основание Devotio moderna Гертом Грооте в Девентере

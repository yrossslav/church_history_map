- id: nld
  title: Нидерландская реформатская
  sub: Вильгельм Оранский
  column: 2
  year: 1571
  branch: ref
  info: 'Нидерландская реформатская церковь сложилась в горниле Восьмидесятилетней войны (1568–1648), где Реформация и национально-освободительная
    борьба против испанского господства слились воедино. После подавления раннего лютеранства и анабаптизма Карлом V кальвинизм
    с 1550-х годов стал ведущей протестантской силой; Ги де Бре составил Бельгийское исповедание (1561). Иконоборческое восстание
    1566 года и террор «Кровавого совета» герцога Альбы превратили конфессиональный протест в общенациональный мятеж, который
    возглавил Вильгельм I Оранский (Молчаливый), официально принявший кальвинизм в 1573 году и проводивший политику веротерпимости.
    Утрехтская уния 1579 года и Акт об отречении от Филиппа II (1581), опиравшийся на кальвинистскую доктрину «низшего магистрата»,
    создали первую крупную протестантскую республику. Реформатская церковь была организована по пресвитерианско-синодальному
    образцу с центром в Лейденском университете, но не была вполне государственной: при привилегированном положении она терпимо
    сосуществовала с католиками, лютеранами и меннонитами. Спор арминиан с гомаристами разрешил международный Дортский синод
    (1618–1619), сформулировавший «пять пунктов кальвинизма» и закрепивший каноны Дорта в числе «Трёх форм единства»; синод
    также инициировал перевод Statenbijbel (1637).'
  sources:
  - needham3
  - needham4
  - three_forms
  - sannikov
  - menno_sann
  live: true
  edges:

    type: solid
    label: продолжение
    info: Кальвин продолжил и систематизировал начатое Цвингли реформатское движение второго поколения.
  - to: bull
    type: solid
    info: Буллингер стал преемником Цвингли в Цюрихе после его гибели при Каппеле.
  - to: buc

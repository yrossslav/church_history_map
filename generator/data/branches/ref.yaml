- id: arm
  title: Арминиане / ремонстранты
  sub: Я. Арминий · Дорт 1619
  column: 3
  year: 1610
  branch: ref
  info: 'Арминиане (ремонстранты) — течение в нидерландском реформатстве, оспорившее строгое кальвинистское учение о предопределении.
    Его родоначальник Якоб Арминий (1560–1609), учившийся в Лейдене и Женеве под руководством Безы и ставший в 1603 году профессором
    богословия в Лейдене, усомнился в безусловном предопределении, опираясь на живую в голландском протестантизме эразмианскую
    традицию более позитивного взгляда на человеческую свободу. Его главным оппонентом стал строгий ортодокс Франциск Гомар.
    После смерти Арминия его сторонники опубликовали в 1610 году «Ремонстрацию» в пяти пунктах, отвергавшую безусловное избрание,
    утверждавшую всеобщую достаточность жертвы Христа, условность благодати и возможность отпадения от неё. Спор немедленно
    политизировался: военный вождь Мориц Нассауский встал на сторону контрремонстрантов и использовал конфликт для разгрома
    соперника — Яна ван Олденбарневелта, покровителя арминиан, казнённого в 1619 году. Международный Дортский синод (ноябрь
    1618 — май 1619) допустил ремонстрантов лишь как обвиняемых и осудил их, ответив «пятью пунктами кальвинизма» (TULIP);
    около 190 пасторов были лишены сана, 80 изгнаны. Арминианство, однако, не исчезло: опальные общины получили законное признание
    к 1795 году, а богословская антиномия благодати и свободы осталась неустранённой.'
  sources:
  - needham4
  - three_forms
  - sannikov
  site: https://www.remonstranten.nl/
  datenote: «Ремонстрация» арминиан в пяти пунктах
  edges:
  - to: met
    type: dash
    label: арминианство
    info: Методизм Уэсли стоял на арминианских позициях — всеобщность искупления против кальвинистского предопределения.
  - to: gen

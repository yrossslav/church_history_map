- id: zwi
  title: Ульрих Цвингли
  sub: Цюрих
  column: 2
  year: 1519
  branch: ref
  info: 'Ульрих Цвингли (1484–1531), гуманист и почитатель Эразма, пришёл к реформационным взглядам независимо от Лютера,
    через принцип ad fontes и чтение греческого Нового Завета; опыт полкового капеллана при разгроме швейцарцев под Мариньяно
    (1515) сделал его врагом наёмничества. С 1519 года, проповедуя в цюрихском Гроссмюнстере методом lectio continua, он начал
    Реформацию, опираясь на городской магистрат: на диспуте 1523 года он вынес 67 тезисов, и совет предписал всему духовенству
    проповедовать «из одной Библии». Цвингли держался регулятивного принципа богослужения (допустимо лишь прямо предписанное
    Писанием), отчего из церквей Цюриха были удалены образы, орган, облачения и алтари. В споре о Вечере он понимал слова
    «Сие есть тело Моё» символически, считая, что вознесённое тело Христа не может присутствовать на земле телесно; этот разрыв
    с Лютером не удалось преодолеть на Марбургском диспуте 1529 года. Его эрастианская экклезиология отождествляла церковь
    и гражданскую общину, что и привело его на поле боя: 11 октября 1531 года Цвингли погиб как воин в битве при Каппеле.
    Дело продолжил Генрих Буллингер, заключивший с Кальвином Цюрихское соглашение (1549) и составивший Второе Гельветическое
    исповедание (1566).'
  sources:
  - needham3
  - zwingli_works
  - sannikov
  - helvetic2
  edges:

- id: cal
  title: Жан Кальвин
  sub: Женева
  column: 2
  year: 1536
  branch: ref
  info: 'Жан Кальвин (1509–1564), француз из Нуайона, получил гуманистическое и юридическое образование, пережил около 1533–1534
    годов «внезапное обращение» и бежал из Франции; в 1536 году в Базеле он издал «Наставление в христианской вере» (Institutio)
    с открытым письмом Франциску I в защиту гонимых протестантов. Принадлежа ко второму поколению реформаторов, Кальвин стал
    не пророком, а архитектором, придавшим Реформации стройную систему. Всё его богословие исходит из абсолютного суверенитета
    Бога (soli Deo gloria); он развил учение о двойном предопределении, поместив его, однако, не в начало системы, а как следствие.
    В Женеве, куда его удержал Гийом Фарель, Кальвин после страсбургского периода (1538–1541, под влиянием Мартина Буцера)
    ввёл «Церковные установления» 1541 года с четырьмя служениями — пасторы, учители, пресвитеры, диаконы — и консисторией;
    борьба за право церковного отлучения завершилась его победой в 1555 году. В Вечере он занял срединную позицию «духовного
    реального присутствия»: Дух Святой реально соединяет верующего с прославленным телом Христа на небесах. Женевская академия
    (1559) под руководством Теодора Безы превратила город в международный центр, рассылавший пасторов во Францию, Нидерланды
    и Шотландию, сделав кальвинизм самой «экспортной» формой Реформации.'
  sources:
  - needham3
  - calvin_institutio
  - mcgrath_calvin
  - calvin_sadoleto
  - sannikov
  edges:
  - to: refc
    type: solid
    info: Кальвин дал реформатским церквам стройную богословскую систему и пресвитерианское устройство.
  - to: arm
    type: dash
    label: оппозиция
    info: Арминиане возникли как оппозиция строгому кальвинистскому учению о двойном предопределении; осуждены на Дортском
      синоде.
  - to: beza
    type: solid
    info: Беза был преемником Кальвина и ректором Женевской академии, систематизировавшим его богословие.
  datenote: первое издание «Наставления в христианской вере»
- id: refc
  title: Реформатские церкви
  sub: пресвит. устройство
  column: 2
  year: 1541
  branch: ref
  info: 'Реформатские (кальвинистские) церкви образуют ветвь магистерской Реформации, берущую начало от Цвингли и Буллингера
    в Цюрихе и от Кальвина и Безы в Женеве, объединённых Цюрихским соглашением 1549 года. От лютеранства их отличают регулятивный
    принцип богослужения, символико-духовное понимание Вечери Господней и акцент на освящении и преображении всей жизни в
    «зрелище славы Бога». Их характерная черта — пресвитерианско-синодальное устройство: коллегиальное управление через собрания
    пресвитеров (пасторов и старейшин-мирян), восходящее по ступеням от консистории прихода к синодам и национальной ассамблее,
    не нуждающееся в государственной опоре и потому пригодное для выживания в гонениях. Богословски традицию определяет заветное
    (федеральное) богословие, разработанное Буллингером, Урзином и Кокцеем: история спасения разворачивается как единый «завет
    благодати» от Адама через Авраама и Моисея ко Христу, что обосновывает и единство двух Заветов, и крещение младенцев.
    Реформатская вера распространилась во Франции, Нидерландах, Шотландии, Англии, Венгрии и Германии, выработав корпус исповеданий
    — Гейдельбергский катехизис (1563), Второе Гельветическое исповедание (1566), каноны Дорта (1619), Вестминстерское исповедание
    (1647). В XVII веке она оформилась в «реформатскую ортодоксию», уравновешенную живым благочестием движений Nadere Reformatie
    и пуританства.'
  sources:
  - needham4
  - calvin_institutio
  - three_forms
  - westminster_ru
  - helvetic2
  wide:
  - 2
  - 3
  edges:
  - to: knox
    type: solid
    info: Из реформатской традиции через Джона Нокса выросло шотландское пресвитерианство.
  - to: nld
    type: solid
    info: Реформатская вера утвердилась в Нидерландах, образовав Нидерландскую реформатскую церковь.
  - to: hug
    type: solid
    info: Гугеноты — французская ветвь реформатских церквей с пресвитерианским устройством.
  - to: lukaris
    type: dash
    label: кальвинистское влияние
    info: Патриарх Кирилл Лукарис испытал кальвинистское влияние, выпустив исповедание в реформатском духе.
  site: https://wcrc.ch/
  datenote: «Церковные установления» Кальвина в Женеве
- id: hug
  title: Гугеноты
  sub: Франция · 1-й синод 1559
  column: 3
  year: 1559
  branch: ref
  info: Гугеноты — французские кальвинисты, чьё прозвание чаще всего возводят к искажённому немецкому Eidgenossen («союзники»).
    Французская Реформация выросла из библейского гуманизма Лефевра д'Этапля и «кружка в Мо», но после «дела о листовках»
    1534 года и под прямым влиянием Женевы приняла отчётливо реформатский облик; в 1559 году первый национальный синод в Париже
    принял пресвитерианское устройство и Галликанское исповедание, составленное при участии Кальвина. К началу 1560-х движение
    достигло около двух миллионов человек (порядка 10% населения) и привлекло крупную аристократию — Конде и адмирала Колиньи.
    Это вылилось в восемь религиозных войн (1562–1598) между Католической лигой Гизов, Бурбонами-гугенотами и умеренными «политиками».
    Кульминацией стала Варфоломеевская ночь 24 августа 1572 года, когда погибло около 20 000 гугенотов; резня обезглавила,
    но не уничтожила движение и породила теории сопротивления тиранам. Войны завершились, когда вождь гугенотов Генрих Наваррский
    принял католичество и стал Генрихом IV, издав Нантский эдикт 1598 года — «веху в истории религиозной свободы». Однако
    Ришельё лишил гугенотов политической автономии (падение Ла-Рошели, 1628), а Людовик XIV отменил эдикт в 1685 году, вынудив
    около 200 000 гугенотов эмигрировать.
  sources:
  - needham3
  - needham4
  - macculloch
  - schaff7
  - sannikov
  site: https://epudf.org/
  datenote: первый национальный синод, Галликанское исповедание
- id: knox
  title: Пресвитериане
  sub: Шотландия · Дж. Нокс
  column: 2
  year: 1560
  branch: ref
  info: Джон Нокс (ок. 1514–1572) возглавил самую радикальную из национальных Реформаций, превратив бедную Шотландию, связанную
    «Старым союзом» с католической Францией, в оплот реформатского пресвитерианства. Обращённый под влиянием мученичества
    Джорджа Уишарта, он провёл девятнадцать месяцев французским галерным рабом, затем служил в Англии Эдуарда VI, а после
    прихода к власти Марии Тюдор бежал на континент; в Женеве он прошёл «школу Кальвина», назвав её «самой совершенной школой
    Христа со времён апостолов». Вернувшись в мае 1559 года, Нокс своими проповедями воспламенил иконоборческое движение,
    а вмешательство английского флота и смерть регентши Марии де Гиз решили исход в пользу протестантов. «Парламент Реформации»
    1560 года утвердил Шотландское исповедание, объявил мессу незаконной и упразднил юрисдикцию папы. В «Книге дисциплины»
    (1561) Нокс изложил пресвитерианское устройство вместе с планами всеобщего образования и помощи бедным. Его памфлет «Первый
    трубный глас против чудовищного правления женщин» (1558) обернулся против него, оскорбив протестантку Елизавету I, а проповеди
    против мессы Марии Стюарт способствовали её падению в 1567 году. Из Шотландии пресвитерианство распространилось в Англию,
    Ирландию и Северную Америку.
  sources:
  - needham3
  - knox_works
  - scots_conf
  - sannikov
  live: true
  site: https://wcrc.ch/
  datenote: «Парламент Реформации», Шотландское исповедание
  edges:

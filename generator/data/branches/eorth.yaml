- id: antioch
  title: Антиохийский патриархат
  sub: древний апостольский престол
  column: -2
  year: 400
  branch: eorth
  info: Антиохийская церковь — один из древнейших апостольских престолов (в Антиохии ученики впервые названы христианами);
    восточный патриархат, к XX в. с преимущественно арабской паствой.
  sources:
  - sannikov
  - pravenc_antioch
  site: https://www.antiochpatriarchate.org/en/home/
  datenote: условно — древний апостольский патриархат
- id: alex
  title: Александрийский патриархат
  sub: престол ап. Марка
  column: -2
  year: 420
  branch: eorth
  info: Александрийский патриархат — престол ап. Марка; после Халкидона бо́льшая часть паствы ушла к коптам, но греко-православный
    (мелькитский) престол сохранился («патриарх всея Африки»).
  sources:
  - sannikov
  - pravenc_alex
  site: https://www.patriarchateofalexandria.com/?lang=en
  datenote: условно — престол ап. Марка накануне Халкидона
- id: cpole
  title: Константинопольский патриархат
  sub: Вселенский престол
  column: -2
  year: 451
  branch: eorth
  info: Константинопольский патриархат — столичная церковь, «первая по чести» среди православных; центр греко-византийского
    православия.
  sources:
  - sannikov
  - pravenc_cpole
  edges:
  - to: greekoc
    type: solid
    label: автокефалия 1833
    info: Константинополь даровал Элладской церкви автокефалию в 1833 году после провозглашения независимости Греции.
  site: https://ec-patr.org/en/
  datenote: Халкидон закрепил статус Константинопольского престола
- id: jerus
  title: Иерусалимский патриархат
  sub: хранитель Святых мест
  column: -2
  year: 470
  branch: eorth
  info: Иерусалимский патриархат — церковь Святых мест, получившая патриаршее достоинство на Халкидонском соборе; иерархия
    (Братство Гроба Господня) исторически греческая.
  sources:
  - sannikov
  site: https://en.jerusalem-patriarchate.info/
  datenote: патриаршее достоинство, дарованное на Халкидоне
- id: byz
  title: Византийская церковь
  sub: греческое православие
  column: -2
  year: 700
  branch: eorth
  info: 'Греко-византийская церковь имперской столицы — ядро восточного православия: богословие, иконопочитание, миссия к
    славянам — вплоть до падения Константинополя.'
  sources:
  - sannikov
  edges:
  - to: rusb
    type: solid
    label: '988'
    info: Из Византии в 988 году пришло крещение Руси при князе Владимире, давшее начало русскому православию.
  - to: photius
    type: solid
    label: '867'
    info: Конфликт византийского патриарха Фотия с Римом (867) впервые чётко обозначил расхождения Востока и Запада.
  - to: cyrmeth
    type: solid
    label: '863'
    info: Византия направила Кирилла и Мефодия с миссией к славянам (863), давшей славянскую письменность и богослужение.
  - to: iconcl
    type: dash
    label: 726/843
    info: Византия пережила иконоборческие споры (726–843), завершившиеся торжеством иконопочитания.
  - to: florence
    type: dash
    label: '1439'
    info: Византия пошла на Флорентийскую унию с Римом (1439) ради помощи против турок, но уния была отвергнута.
  - to: paulic
    type: dash
    label: дуализм
    info: В Византии распространялось дуалистическое движение павликиан, с которым церковь боролась.
  - to: athos
    type: solid
    label: монашество
    info: Византия дала начало афонскому монашеству — главному центру православной аскезы.
  - to: serbian
    type: solid
    info: Из Византии православие распространилось к сербам, оформившись в Сербскую церковь.
  - to: romanian
    type: dash
    info: Византийское православие через славяно-болгарское посредничество легло в основу румынской церковности.
  - to: georgian
    type: dash
    info: Византийская традиция тесно связана с древним грузинским православием и его католикосатом.
  datenote: условно — расцвет византийского православия
- id: cyrmeth
  title: Кирилл и Мефодий
  sub: миссия к славянам
  column: -3
  year: 863
  branch: eorth
  info: Солунские братья Кирилл и Мефодий создали славянскую азбуку и перевели Писание; их моравская миссия (863) положила
    начало славянскому христианству и богослужению.
  sources:
  - sannikov
  edges:
  - to: bulgar
    type: dash
    info: Дело Кирилла и Мефодия и их учеников укоренило славянское христианство в Болгарии.
  datenote: моравская миссия Кирилла и Мефодия к славянам
- id: bulgar
  title: Болгарская церковь
  sub: крещение Болгарии
  column: -3
  year: 864
  branch: eorth
  info: Христианизация Болгарии при князе Борисе (ок. 864) из Византии — важнейший центр славянского православия.
  sources:
  - sannikov
  edges:
  - to: bulgarp
    type: solid
    label: патриаршество
    info: Болгарская церковь со временем обрела патриаршее достоинство (Тырново, экзархат, патриархат).
  datenote: Крещение Болгарии при князе Борисе
- id: photius
  title: Фотиев раскол
  sub: схизма с Римом · 867
  column: -2
  year: 867
  branch: eorth
  info: Конфликт патриарха Фотия с папой Николаем I (с 867) впервые чётко обозначил различия Востока и Запада (Filioque, примат
    папы) — предвестник Великого раскола.
  sources:
  - sannikov
  edges:
  - to: hesych
    type: dash
    info: Византийская богословская традиция, заострённая в споре с Римом, позднее раскрылась в исихазме.
  datenote: Фотиев раскол с папой Николаем I
- id: athos
  title: Афон
  sub: центр православного монашества
  column: -2
  year: 963
  branch: eorth
  info: Афон (Святая Гора) — главный центр православного монашества; расцвет лавр с устроением св. Афанасия (~963), монашеская
    республика под омофором Константинополя.
  sources:
  - sannikov
  - pravenc_afon
  edges:
  - to: paisii
    type: dash
    label: переводы на Афоне
    info: На Афоне велись переводы святоотеческих текстов, питавшие деятельность Паисия Величковского.
  datenote: основание Великой лавры св. Афанасия на Афоне
- id: georgian
  title: Грузинская церковь
  sub: св. Нина · католикосат
  column: -3
  year: 1010
  branch: eorth
  info: Грузинская (Иберийская) церковь — основана проповедью св. Нины (IV в.); древний католикосат, автокефалия восстановлена
    в XX в.
  sources:
  - sannikov
  - azbyka_pomestnye
  site: https://patriarchate.ge/
  datenote: условно — упрочение древнего грузинского католикосата
- id: serbian
  title: Сербская церковь
  sub: св. Савва · автокефалия
  column: -3
  year: 1219
  branch: eorth
  info: Сербская православная церковь — независимая архиепископия при св. Савве (1219), позже патриаршество; автокефалия восстановлена
    в XIX–XX вв.
  sources:
  - sannikov
  - pravenc_serb
  site: https://spc.rs/en/
  datenote: автокефальная архиепископия при св. Савве
- id: hesych
  title: Исихазм
  sub: Григорий Палама
  column: -2
  year: 1340
  branch: eorth
  info: Исихазм — учение о внутреннем безмолвии и нетварном Фаворском свете, обоснованное Григорием Паламой против Варлаама;
    победило на соборах 1341–1351.
  sources:
  - sannikov
  edges:
  - to: fallcp
    type: solid
    info: Исихазм стал последним духовным расцветом Византии накануне падения Константинополя в 1453 году.
  - to: paisii
    type: solid
    label: возрождение умного делания
    info: Исихастское учение об умном делании возродилось благодаря Паисию Величковскому.
  datenote: паламитские споры, торжество исихазма
- id: fallcp
  title: Падение Константинополя
  sub: конец Византии · 1453
  column: -2
  year: 1453
  branch: eorth
  info: Взятие Константинополя турками-османами в 1453 г. и гибель Византийской империи; после этого опорой православия становится
    Россия («Москва — Третий Рим»).
  sources:
  - sannikov
  edges:
  - to: ierem
    type: solid
    info: После падения Константинополя престолом под османами управлял, в частности, патриарх Иеремия II.
  - to: rusr
    type: dash
    label: Третий Рим
    info: После гибели Византии Россия восприняла идею «Москва — Третий Рим» как опору православия.
  datenote: падение Константинополя, конец Византии
- id: ierem
  title: Патриарх Иеремия II
  sub: диалог с лютеранами
  column: -2
  year: 1576
  branch: eorth
  info: Константинопольский патриарх Иеремия II (1530–1595) вёл переписку с тюбингенскими лютеранами (1576–1581) — первый
    крупный диалог православия с протестантами; завершился расхождением.
  sources:
  - sannikov
  - needham4
  edges:
  - to: lukaris
    type: solid
    info: Преемником константинопольской традиции диалога с протестантами стал патриарх Кирилл Лукарис.
  - to: rusp
    type: solid
    label: учредил патриаршество 1589
    info: Патриарх Иеремия II в 1589 году учредил Московское патриаршество.
  datenote: переписка Иеремии II с тюбингенскими лютеранами
- id: brest
  title: Брестская уния
  sub: греко-католики · 1596
  column: -3
  year: 1596
  branch: eorth
  info: 'Брестская уния (1596): часть западнорусской иерархии подчинилась Риму, сохранив восточный обряд, — так возникла греко-католическая
    (униатская) церковь.'
  sources:
  - sannikov
  datenote: Брестская уния — рождение греко-католиков
- id: lukaris
  title: Кирилл Лукарис
  sub: «Восточное исповедание» 1629
  column: -2
  year: 1629
  branch: eorth
  info: Кирилл Лукарис (1572–1638), Константинопольский патриарх с кальвинистскими симпатиями; его «Восточное исповедание
    веры» (1629) вызвало бурю и было осуждено рядом православных соборов.
  sources:
  - sannikov
  - needham4
  datenote: «Восточное исповедание веры» Кирилла Лукариса
- id: mogila
  title: Пётр Могила
  sub: «Православное исповедание» 1640
  column: -3
  year: 1640
  branch: eorth
  info: Пётр Могила (1597–1647), митрополит Киевский; его «Православное исповедание» (1640), утверждённое в Яссах (1642),
    — ответ Лукарису и пример латинского влияния в православии.
  sources:
  - sannikov
  - needham4
  datenote: «Православное исповедание» Петра Могилы
- id: oldbel
  title: Старообрядцы
  sub: раскол при Никоне
  column: -3
  year: 1666
  branch: eorth
  info: Старообрядчество — отделившиеся после реформ патриарха Никона (1666) противники исправления книг и обрядов во главе
    с Аввакумом; существует доныне.
  sources:
  - sannikov
  edges:
  - to: popovtsy
    type: solid
    label: приемлющие священство
    info: Среди старообрядцев выделились поповцы, сохранившие священство через Белокриницкую иерархию.
  - to: bespopovtsy
    type: solid
    label: отвергшие священство
    info: Среди старообрядцев выделились беспоповцы, отвергшие священство после раскола.
  - to: edinoverie
    type: dash
    label: примирение с РПЦ
    info: Часть старообрядцев через единоверие примирилась с Русской православной церковью.
  datenote: раскол старообрядцев после реформ Никона
- id: greekoc

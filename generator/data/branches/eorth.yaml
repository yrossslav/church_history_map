- id: antioch
  title: Антиохийский патриархат
  sub: древний апостольский престол
  column: -2
  year: 400
  branch: eorth
  info: Антиохийская церковь — один из древнейших апостольских престолов (в Антиохии ученики впервые названы христианами);
    восточный патриархат, к XX в. с преимущественно арабской паствой.
  sources:
  - sannikov
  - pravenc_antioch
- id: alex
  title: Александрийский патриархат
  sub: престол ап. Марка
  column: -2
  year: 420
  branch: eorth
  info: Александрийский патриархат — престол ап. Марка; после Халкидона бо́льшая часть паствы ушла к коптам, но греко-православный
    (мелькитский) престол сохранился («патриарх всея Африки»).
  sources:
  - sannikov
  - pravenc_alex
- id: cpole
  title: Константинопольский патриархат
  sub: Вселенский престол
  column: -2
  year: 451
  branch: eorth
  info: Константинопольский патриархат — столичная церковь, «первая по чести» среди православных; центр греко-византийского
    православия.
  sources:
  - sannikov
  - pravenc_cpole
  edges:
  - to: greekoc
    type: solid
    label: автокефалия 1833
- id: jerus
  title: Иерусалимский патриархат
  sub: хранитель Святых мест
  column: -2
  year: 470
  branch: eorth
  info: Иерусалимский патриархат — церковь Святых мест, получившая патриаршее достоинство на Халкидонском соборе; иерархия
    (Братство Гроба Господня) исторически греческая.
  sources:
  - sannikov
- id: byz
  title: Византийская церковь
  sub: греческое православие
  column: -2
  year: 700
  branch: eorth
  info: 'Греко-византийская церковь имперской столицы — ядро восточного православия: богословие, иконопочитание, миссия к
    славянам — вплоть до падения Константинополя.'
  sources:
  - sannikov

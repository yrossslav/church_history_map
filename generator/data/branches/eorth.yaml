  column: -3
  year: 1885
  branch: eorth
  info: Румынская православная церковь — автокефалия (признана в 1885) с независимостью Румынии, патриаршество с 1925 г.;
    вторая по численности после Русской.
  sources:
  - sannikov
  - azbyka_pomestnye
  live: true
  site: https://patriarhia.ro/en/
  datenote: признание автокефалии Румынской церкви
- id: bulgarp

- id: smi
  title: Баптисты · Джон Смит
  sub: первая община · влияние меннонитов
  column: 12
  year: 1609
  branch: bap
  info: 'Джон Смит (ок. 1570–1612) — кембриджский выпускник и бывший пресвитер Английской церкви, ставший вместе с Томасом
    Хелвисом основателем английского баптизма. Возглавив сепаратистскую конгрегацию из Гейнсборо, он переселился около 1607
    года в Амстердам, где под влиянием голландского арминианского спора и непосредственного контакта с меннонитами-ватерландцами
    пришёл к убеждению: крещение в Новом Завете всегда следует за личным исповеданием веры, а потому крещение младенцев недействительно.
    Следствия оказались радикальными: конгрегация объявила себя «нецерковью», все её члены — некрещёными, и Смит в 1609 году
    крестил сначала самого себя путём обливания, а затем Хелвиса и остальных, образовав первую известную английскую баптистскую
    общину (крещение было именно обливанием, а не погружением). Богословски он принял меннонитское учение об условном избрании
    и всеобщем искуплении. Позднее Смита одолели сомнения в действительности «самокрещения», и он вместе с большинством обратился
    с просьбой о крещении к меннонитам; не дождавшись его, он умер в Амстердаме в 1612 году. Непрерывную баптистскую традицию
    составили именно те, кто не последовал за Смитом к меннонитам.'
  sources:
  - needham4
  wide:
  - 12
  - 13
  edges:
  - to: gen
    type: solid
    info: Из общины Джона Смита берут начало общие баптисты, унаследовавшие арминианское учение об общем искуплении.
  - to: part
    type: solid
    info: Английский баптизм Смита дал начало и второй ветви — частным баптистам кальвинистского толка.
  - to: helwys
    type: solid
    info: Смит вместе с Томасом Хелвисом основал первую английскую баптистскую общину в Амстердаме.
  site: https://baptistworld.org/
  datenote: первая баптистская община Джона Смита в Амстердаме

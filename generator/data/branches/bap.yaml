- id: gen
  title: Общие баптисты
  sub: арминиане
  column: 12
  year: 1640
  branch: bap
  info: 'Общие баптисты — старейшая ветвь английского баптизма, наследники Джона Смита и Томаса Хелвиса, исповедовавшая арминианское
    учение об общем (general) искуплении: Христос умер за всех людей без исключения, а человек свободен принять или отвергнуть
    спасение. Это богословие восходило к влиянию меннонитов-ватерландцев и к атмосфере голландского арминианского спора. После
    возвращения части конгрегации на родину в конце 1611 года Хелвис основал первую баптистскую церковь на английской почве
    в лондонском Спиталфилдзе и в том же году издал «Декларацию веры» — первый баптистский символ на английском языке. Преемником
    Хелвиса стал Джон Мортон, продолживший защиту свободы совести. К 1660 году в Англии насчитывалось около 110 общинных баптистских
    церквей. Именно в этой среде впервые прозвучали радикальные для своего времени призывы к полной веротерпимости и отделению
    церкви от государства.'
  sources:
  - needham4
  edges:
  - to: ubr
    type: solid
    label: объединение
    info: Общие баптисты влились в объединённый Баптистский союз Великобритании, преодолев богословское размежевание.
  - to: onc
    type: solid
    label: континент. баптизм
    info: Английский и американский баптизм дал импульс континентальному (немецкому) баптизму Иоганна Онкена.
  - to: ecumen
    type: dash
    info: Баптистская традиция веротерпимости и добровольной церкви позднее соприкоснулась с экуменическим движением.
  - to: missions
    type: dash
    label: общество Кэри
    info: Из баптистской среды вырос интерес к миссии, воплощённый в обществе Уильяма Кэри.
  site: https://baptistworld.org/
  datenote: условно — оформление общих баптистов-арминиан
- id: part
  title: Частные баптисты
  sub: кальвинисты
  column: 13
  year: 1640
  branch: bap
  info: 'Частные баптисты возникли независимо от общих — около 1633–1638 годов, выйдя из конгрегационалистской общины Джекоба–Ласропа–Джесси
    в лондонском Саутуарке. В отличие от арминиан-общих, они придерживались строго кальвинистского учения о частном (particular)
    искуплении в духе Дортского синода — Христос умер только за избранных. Именно частные баптисты в 1641–1642 годах первыми
    среди английских баптистов стали практиковать крещение полным погружением: один из руководителей общины, Ричард Блант,
    был специально отправлен за опытом к голландским меннонитам-коллегиантам. В 1644 году они издали Первое Лондонское вероисповедание,
    а в 1677/1689 годах — Второе Лондонское вероисповедание, воспроизводившее основу Вестминстерского исповедания с баптистским
    учением о крещении. К 1689 году частные баптисты объединяли 107 общин. Именно эта кальвинистская ветвь, давшая английскому
    баптизму Джона Буньяна и сделавшая погружение нормой, стала богословским ядром, из которого выросла позднейшая баптистская
    деноминация.'
  sources:
  - needham4
  edges:
  - to: ubr
    type: solid
    info: Частные баптисты вместе с общими образовали единый Баптистский союз Великобритании в 1891 году.
  - to: globalsouth
    type: dash
    label: баптисты Юга
    info: Из английской и американской баптистской традиции (особенно южных баптистов) через миссии выросла одна из крупнейших
      протестантских деноминаций Глобального Юга — в Африке, Латинской Америке и Азии.
  site: https://baptistworld.org/
  datenote: условно — оформление частных баптистов-кальвинистов
- id: ubr
  title: Баптистский союз (Англия)
  sub: '1891'
  column: 12
  year: 1891
  branch: bap
  info: 'Баптистский союз Великобритании оформился как общенациональное объединение в XIX веке: разрозненные ассоциации частных
    и общих баптистов, преодолевая былое богословское размежевание по вопросу искупления, постепенно сближались на почве общего
    исповедания крещения по вере и принципа добровольной церкви. Слияние общих баптистов нового направления (New Connexion)
    с частными завершилось реорганизацией союза в 1891 году, создавшей единую структуру британского баптизма. Этот шаг стал
    логическим завершением двухвековой истории, начатой Смитом и Хелвисом в Амстердаме и продолженной частными баптистами
    Саутуарка. К этому времени баптизм уже превратился из гонимого диссентерского меньшинства в крупную часть английского
    нонконформизма, давшую миру таких проповедников, как Чарльз Сперджен. В дальнейшем именно из английской и американской
    баптистской традиции вырастет крупнейшая протестантская деноминация мирового Юга.'
  sources:
  - needham4
  - pravenc_method
  live: true
  site: https://www.baptist.org.uk/
  datenote: реорганизация Баптистского союза Великобритании

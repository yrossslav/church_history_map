- id: ebion
  title: Евиониты
  sub: иудеохристиане
  column: 1
  year: 100
  branch: ext
  info: Евиониты — иудеохристиане, отрицавшие полную божественность Христа и настаивавшие на исполнении Закона Моисеева; один
    из корней монархианства.
  sources:
  - sannikov
  - schaff6
  edges:
  - to: monarch
    type: dash
- id: gnostic
  title: Гностицизм · Маркион
  sub: II в. · отвергнуты
  column: 2
  year: 150
  branch: ext
  info: Гностицизм и маркионизм (II в.) — ранние течения, отвергавшие Бога Ветхого Завета и учившие о спасении через тайное
    знание; отвергнуты Великой Церковью.
  sources:
  - sannikov
  - schaff6
- id: montan
  title: Монтанизм
  sub: «новое пророчество»
  column: 3
  year: 165
  branch: ext
  info: Монтанизм (с ~156) — движение «нового пророчества» с экстатическими откровениями и строгим аскетизмом; осуждён как
    ересь, хотя к нему примкнул Тертуллиан.
  sources:
  - sannikov
  - schaff6
- id: monarch
  title: Монархианство
  sub: антитринитарии
  column: 2
  year: 205
  branch: ext
  info: Монархианство (II–III вв.) — антитринитарии, отрицавшие различие Лиц ради строгого единобожия; делилось на динамическое
    и модалистское направления.
  sources:
  - sannikov
  - schaff6
  edges:
  - to: adopt
    type: solid
    label: динамич.
  - to: sabell
    type: solid
    label: модализм
- id: sabell
  title: Савеллианство
  sub: модализм
  column: 3
  year: 225
  branch: ext
  info: 'Савеллианство — модалистское монархианство: Отец, Сын и Дух — лишь модусы (роли) единой Монады (Ноэт, Савеллий).'
  sources:
  - sannikov
  - schaff6
- id: adopt
  title: Адопцианство
  sub: Павел Самосатский
  column: 4
  year: 268
  branch: ext
  info: 'Адопцианство — динамическое монархианство: Христос — человек, ставший Богом через усыновление (Павел Самосатский,
    осуждён в 268).'
  sources:
  - sannikov
  - schaff6
- id: donat
  title: Донатизм
  sub: Сев. Африка · чистота церкви
  column: 2
  year: 311
  branch: ext
  info: Донатизм (с 311, Северная Африка) — раскол ригористов, отрицавших действительность таинств у «падших» клириков; против
    него писал Августин.
  sources:
  - sannikov
  - schaff6
- id: arian
  title: Арианство
  sub: осуждено в Никее · готы
  column: 3
  year: 325
  branch: ext
  info: Арианство (с ~320, пресвитер Арий) — учение о тварности Сына Божия; осуждено I Никейским собором (325), но широко
    распространилось, особенно среди германцев-готов.
  sources:
  - sannikov
  - schaff6
  edges:
  - to: apollin
    type: dash
    label: христология
  - to: pneuma
    type: solid
    label: полуариане
- id: apollin
  title: Аполлинарианство
  sub: умаление человечности
  column: 4
  year: 360
  branch: ext
  info: Аполлинарианство — христология, умалявшая человечество Христа (Логос вместо человеческого ума); осуждено в 381; предтеча
    монофизитства.
  sources:
  - sannikov
  - schaff6
- id: pneuma
  title: Духоборцы
  sub: пневматомахи · 381
  column: 5
  year: 360
  branch: ext
  info: Духоборцы (пневматомахи, македониане) — отрицали божественность Святого Духа; осуждены на II Вселенском соборе (381).
  sources:
  - sannikov
  - schaff6
- id: pelag
  title: Пелагианство
  sub: спор о благодати · осуждено
  column: 2
  year: 415
  branch: ext
  info: Пелагианство (нач. V в.) — учение Пелагия о достижении спасения собственными усилиями без особой благодати; осуждено
    по настоянию Августина.
  sources:
  - sannikov
  - schaff6
- id: paulic
  title: Павликиане
  sub: дуалисты Малой Азии
  column: -4
  year: 720
  branch: ext
  info: Павликиане (с VII в., Малая Азия) — дуалистическое движение, признававшее двух богов; внешне евангельское, по сути
    манихейский гнозис; расселены во Фракию.
  sources:
  - sannikov
  edges:
  - to: bogomil
    type: dash
- id: iconcl
  title: Иконоборчество
  sub: 726–843
  column: -4
  year: 726
  branch: ext
  info: Иконоборчество (с ~726, имп. Лев III) — движение против почитания икон; осуждено, иконопочитание восстановлено в 843
    г. («Торжество православия»).
  sources:
  - sannikov
- id: bogomil
  title: Богомилы
  sub: болгарские дуалисты
  column: -4
  year: 950
  branch: ext
  info: Богомилы (X в., Болгария) — дуалистическая секта, смешавшая евангельские идеи с гностическим дуализмом; предшественники
    катаров и альбигойцев.
  sources:
  - sannikov
  edges:
  - to: cathar
    type: dash
    label: дуализм на Запад
- id: cathar
  title: Катары · альбигойцы
  sub: дуалисты · подавлены
  column: 5
  year: 1210
  branch: ext
  info: Катары (альбигойцы) — дуалистическая ересь юга Франции (XII–XIII вв.), родственная богомилам; подавлена Альбигойским
    крестовым походом и инквизицией.
  sources:
  - sannikov
  - schaff6
- id: florence
  title: Флорентийская уния
  sub: 1439 · отвергнута
  column: -4
  year: 1439
  branch: ext
  info: Ферраро-Флорентийская уния (1439) — попытка объединить Восток с Римом ради военной помощи Византии; отвергнута восточным
    духовенством и народом.
  sources:
  - sannikov
- id: restor
  title: Реставрационизм
  sub: «Церкви Христа»
  column: 7
  year: 1962
  branch: ext
  info: Реставрационизм («Церкви Христа» и родственные группы) — стремление «восстановить» новозаветную церковь без деноминаций.
  sources:
  - sannikov
  live: true

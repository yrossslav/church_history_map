- id: ana
  title: Швейцарские братья
  sub: анабаптисты · Цюрих, 1525
  column: 5
  year: 1525
  branch: rad
  info: 'Колыбелью анабаптизма стал Цюрих, где молодые ученики Цвингли — аристократ Конрад Гребель (ок. 1498–1526), сын каноника
    Феликс Манц (ок. 1498–1527) и бывший священник Георг Блаурок (ок. 1491–1529) — сочли своего учителя непоследовательным:
    после Второго цюрихского диспута 1523 года Цвингли согласился ждать санкции городского совета, тогда как радикалы требовали
    немедленного следования Писанию. Решающим стал вопрос о крещении младенцев, которого, по их убеждению, нет в Новом Завете;
    в январе 1525 года совет присудил победу Цвингли и обязал крестить детей под страхом изгнания. В ответ 21 января 1525
    года около шестнадцати человек собрались в доме Манца, где Блаурок попросил Гребеля крестить его по исповеданию веры,
    а затем сам крестил остальных — это событие считается «днём рождения анабаптизма». Так впервые в ходе Реформации возникла
    церковь сознательно уверовавших, прозванных «Швейцарскими братьями». Цвингли и совет расценили это как анархию: в 1526
    году повторное крещение каралось утоплением, и 5 января 1527 года Манц стал первым анабаптистом, казнённым протестантским
    государством, — его утопили в реке Лиммат. Блаурока изгнали и сожгли католики в Инсбруке (1529), а Гребель умер от чумы
    в 1526 году.'
  sources:
  - needham3
  - estep
  - sannikov
  - macculloch
  wide:
  - 4
  - 5
  edges:
  - to: hub
    type: solid
    label: Моравия
    info: Из цюрихского анабаптизма движение распространилось через Хубмайера в Моравию с крещением верующих.
  - to: shl
    type: solid
    info: От Швейцарских братьев традиция привела к Шляйтхаймскому исповеданию — первому вероучению анабаптизма.
  - to: men
    type: solid
    info: Швейцарский анабаптизм продолжился в мирном меннонитском крыле Менно Симонса.
  - to: hoff
    type: dash
    label: мельхиоритское крыло
    info: Мельхиор Хоффман перенёс анабаптистское крещение по вере на север Германии и в Нидерланды, добавив апокалиптические
      ожидания.
  datenote: первое крещение по вере в Цюрихе — рождение анабаптизма
- id: hub
  title: Б. Хубмайер
  sub: Моравия · крещение верующих
  column: 4
  year: 1526
  branch: rad
  info: 'Бальтазар Хубмайер (ок. 1485–1528) — наиболее образованный богослов раннего анабаптизма и единственный его лидер
    с докторской степенью (доктор богословия Ингольштадта, 1512); первоначально соборный проповедник, он перешёл к Реформации,
    а в Вальдсхуте близ Цюриха в 1525 году ввёл крещение по вере и сам принял его. Богословски Хубмайер расходился с Лютером
    по вопросу о свободе воли: в трактате «О свободе воли» (1527) он защищал синергическую сотериологию («Бог создал тебя
    без твоей помощи, но без твоей помощи Он тебя не спасёт») и резко осуждал Августина, по существу соглашаясь с Эразмом.
    Он различал три крещения — духовное, водное и «крещение кровью» — и видел в водном крещении не средство благодати, а знак
    уже совершившегося возрождения. В отличие от пацифистского большинства, Хубмайер не считал меч безусловно несовместимым
    с верой. Спасаясь от преследований, он бежал в моравский Никольсбург, где крестил несколько тысяч человек, но был выдан
    австрийским властям и в 1528 году сожжён в Вене; через несколько дней его жену утопили в Дунае. Ему принадлежит знаменитая
    формула веротерпимости: «Мы не можем переубедить турка или еретика мечом или огнём, а только терпением и молитвой».'
  sources:
  - needham3
  - estep
  - mcgrath_thought
  edges:
  - to: hutter
    type: solid
    label: общинная ветвь
    info: От моравского анабаптизма Хубмайера выросла общинная гуттеритская ветвь с общностью имущества.
  datenote: введение Хубмайером крещения по вере, переход в Моравию
- id: shl
  title: Шляйтхаймское исповедание
  sub: М. Заттлер · 7 статей
  column: 5
  year: 1527
  branch: rad
  info: 'Шляйтхаймское исповедание (февраль 1527) — первый вероисповедный документ анабаптизма, принятый на синоде общин в
    местечке Шляйтхайм под председательством Михаэля Заттлера (ок. 1490–1527), бывшего бенедиктинского монаха. Известное также
    как «Братский союз», оно состоит из семи статей: крещение по вере (с отвержением крещения младенцев как «высшей папской
    мерзости»); церковное отлучение по образцу Матфея 18; допуск к Вечере только крещённых по вере; отделение верующих от
    мира; избрание пастырей общиной; отказ от меча; запрет всякой присяги. Шестая статья формулирует анабаптистский пацифизм:
    меч установлен Богом «вне совершенства Христа», а в Церкви применяется лишь отлучение. Документ примечателен тем, что
    посвящён исключительно вопросам нравственности и церковного порядка, не касаясь догматических споров, — что выдаёт приоритет
    этики и жизни общины над систематическим богословием. Вскоре после собора Заттлер был схвачен в Роттенбурге, осуждён за
    ересь и измену и в мае 1527 года казнён с изощрённой жестокостью; его жену утопили.'
  sources:
  - needham3
  - estep
  - sannikov
  datenote: Шляйтхаймское исповедание — первое вероучение анабаптизма
- id: hoff
  title: Мельхиор Хоффман
  sub: мельхиориты · апокалиптика
  column: 6
  year: 1530
  branch: rad
  info: Мельхиор Хоффман (ок. 1495–1543) — странствующий проповедник родом из Швабии, по профессии скорняк, ставший одним
    из самых влиятельных распространителей анабаптизма в Нидерландах и северной Германии и придавший ему апокалиптический
    характер. Не получив систематического образования, он проповедовал в Прибалтике, Скандинавии и Страсбурге, всё сильнее
    увлекаясь толкованием пророчеств. Хоффман учил, что в 1533 году наступит Второе пришествие, а Страсбург станет «Новым
    Иерусалимом», и сам добровольно отдался под арест, ожидая исполнения пророчества; он провёл в страсбургской тюрьме около
    десяти лет вплоть до смерти. Его последователи, мельхиориты, после провала предсказания истолковали ошибку как географическую
    — Новым Иерусалимом должен был стать не Страсбург, а Мюнстер. Хоффман отличался и своеобразной христологией («небесная
    плоть» Христа), но историческое значение его учения в том, что именно мельхиоритская апокалиптика, оторвавшись от пацифистской
    шляйтхаймской традиции, дала идеологическую почву для мюнстерской катастрофы.
  sources:
  - needham3
  - estep
  - macculloch
  edges:
  - to: mun
    type: solid
    label: → тупик
    info: Апокалиптические мельхиориты Хоффмана захватили Мюнстер — движение выродилось в насильственную теократию (тупик).
  datenote: апокалиптический анабаптизм мельхиоритов Хоффмана
- id: spirit
  title: Спиритуалисты
  sub: Денк · Франк · Швенкфельд
  column: 7
  year: 1530
  branch: rad
  info: Спиритуалисты — второе из трёх течений радикальной Реформации по классификации Уильямса, ставившее «внутреннее Слово»
    (непосредственное озарение Духом) выше «внешнего Слова» Писания и таинств; противники называли их Schwärmer, «вдохновителями».
    Их питал средневековый мистицизм Таулера и «Немецкого богословия», и они тяготели к индивидуальному духовному опыту, нередко
    с безразличием к внешней церковной организации. Ганс Денк (ок. 1500–1527), гуманист и знаток языков, учил о внутреннем
    Слове и всеобщей любви Бога, склоняясь к универсализму. Себастьян Франк (1499–1542) был историком и вольнодумцем, который,
    стремясь остаться «вне схватки» между католиками, лютеранами и радикалами, отстаивал чисто внутреннюю, невидимую церковь
    и веротерпимость, за что преследовался всеми сторонами. Каспар Швенкфельд (1489–1561), силезский дворянин, разошёлся с
    Лютером по вопросу о Вечере Господней, проповедуя духовное вкушение Христа; его последователи (швенкфельдиане) сохранились
    до наших дней. Спиритуалистов роднили недоверие к внешним формам и упор на личное преображение, но именно эта опора на
    частное откровение открывала путь к субъективизму.
  sources:
  - needham3
  - sannikov
  - mcgrath_thought
  site: https://www.schwenkfelderchurch.org/
  datenote: условно — расцвет спиритуалистов «внутреннего Слова»
- id: mun
  title: Мюнстер (Новый Иерусалим)
  sub: тупиковая ветвь
  column: 6
  year: 1534
  branch: rad
  info: Мюнстерское «королевство» (1534–1535) — самый трагический эпизод радикальной Реформации, превративший северогерманский
    Мюнстер в апокалиптическую теократию. Реформацию принёс в город около 1529 года священник Бернард Ротманн, который к 1533
    году привлёк большинство горожан, а затем отверг крещение младенцев; на волне этого радикализма в Мюнстер стекались гонимые
    мельхиориты, особенно из Нидерландов. К февралю 1534 года власть захватили двое нидерландцев — пекарь Ян Матис, объявивший
    себя пророком, и его ученик Ян Бёкельс (Ян Лейденский); они провозгласили Мюнстер Новым Иерусалимом, перекрестили или
    изгнали несогласных и выдворили католического епископа-князя. После гибели Матиса (апрель 1534) Бёкельс короновался «королём
    Нового Иерусалима», отменил частную собственность, ввёл многожёнство и установил смертную казнь за богохульство и непослушание.
    Шестнадцать месяцев город находился в осаде, пока в июне 1535 года не был сдан изнутри; жителей перебили, а вождей запытали
    до смерти и подвесили в железных клетках на башне церкви святого Ламберта, где клетки висят и поныне. Мюнстер был не плодом,
    а извращением анабаптистского богословия, однако он навсегда дискредитировал движение и дал властям повод видеть в каждом
    «перекрещенце» революционера.
  sources:
  - needham3
  - estep
  - sannikov
  - macculloch
  datenote: захват власти в Мюнстере, «Новый Иерусалим»
- id: men
  title: Менно Симонс → меннониты
  sub: пацифизм · непротивление
  column: 5
  year: 1537
  branch: rad
  info: 'Менно Симонс (1496–1561) — нидерландский священник из Витмарсума во Фризии, рукоположённый в католики в 1524 году,
    чьи сомнения о пресуществлении и крещении младенцев долго оставались тайными. Поворотом стал 1535 год: его брат Питер
    погиб с тремя сотнями анабаптистов при захвате монастыря близ Болсварда, и Менно, потрясённый собственным лицемерием,
    в 1536 году принял крещение по вере, а в 1537 году был рукоположён в старейшины. Он решительно отмежевался от мюнстерского
    насилия, написав трактат «Богохульство Яна Лейденского», и почти в одиночку спас нидерландский и северогерманский анабаптизм
    от распада и фанатизма. Его главный труд «Основа христианской доктрины» (1539) изложил учение о добровольной церкви верующих,
    крещении по вере, строгом отлучении, пацифизме и отделении церкви от государства. Двадцать пять лет Менно провёл в странствиях
    как разыскиваемый беглец (за его поимку давали 100 флоринов), крестил по ночам, передвигался на костылях, но в 1554 году
    получил убежище и умер своей смертью в 1561 году. По его имени мирное крыло нидерландских анабаптистов стало называться
    меннонитами; их оружием Менно называл «терпение, молчание и надежду, и Слово Божье».'
  sources:
  - needham3
  - menno_sann
  - sannikov
  - estep
  wide:
  - 4
  - 6
  live: true
  edges:
  - to: water
    type: solid
    info: Из меннонитства выделилось умеренное ватерландское крыло, отказавшееся от строгого отлучения.
  - to: fris
    type: solid
    label: три направления
    info: Меннонитство разделилось на территориальные направления, одно из которых — умеренные фризийцы.
  - to: flem
    type: solid
    info: Среди меннонитов обособилось строгое фламандское крыло, отстаивавшее суровое отлучение.
  - to: menbr
    type: solid
    label: обновление в России
    info: Меннонитство дало позднее обновленческих Братских меннонитов в России под влиянием пиетизма.
  site: https://mwc-cmm.org/en/
  datenote: рукоположение Менно Симонса в старейшины меннонитов
- id: water
  title: Ватерландцы
  sub: мягкое крыло
  column: 4
  year: 1560
  branch: rad
  info: 'Ватерландцы (Waterlanders) — наиболее умеренное и терпимое крыло нидерландских меннонитов, названное по болотистой
    области Ватерланд к северу от Амстердама и оформившееся около 1557 года, когда часть общин отказалась от практики строгого
    отлучения (бана) и принудительного «избегания» отлучённых, которую отстаивали фламандско-фризские ригористы. Ватерландцы
    тяготели к более свободной церковной дисциплине, меньшей замкнутости и большей открытости к сотрудничеству с другими протестантами.
    Именно их мягкость сделала возможным исторический контакт с английскими сепаратистами-беженцами: около 1609 года в Амстердаме
    Джон Смит, придя к убеждению о крещении по вере, сблизился с ватерландской общиной, и часть его последователей влилась
    в неё. Так ватерландцы стали документально прослеживаемым мостом между континентальным анабаптизмом и зарождающимся английским
    баптизмом, принципы которого — добровольная церковь верующих и крещение по исповеданию — восходят к меннонитскому наследию.'
  sources:
  - menno_sann
  - estep
  - sannikov
  datenote: условно — обособление умеренных ватерландцев (~1557)
  edges:
  - to: smi
    type: dash
    label: влияние на Смита
    info: Крещение по вере Джон Смит перенял под влиянием голландских меннонитов-ватерландцев в Амстердаме; позднее он искал
      объединения с ними — так у баптистов появился меннонитский корень.
- id: fris
  title: Фризийцы
  sub: умеренное крыло
  column: 5
  year: 1560
  branch: rad
  info: Фризийцы (Frisians) — одно из основных территориальных крыльев меннонитского движения, сложившееся в результате раскола
    1567 года, который разделил нидерландских анабаптистов на фризов и фламандцев. Названия закрепились по областям происхождения
    общин (Фрисландия и Фландрия), однако разделение быстро утратило прямую географическую привязку и превратилось в спор
    о строгости церковной дисциплины, бытовых обычаях и применении отлучения. Парадоксальным образом именно фризы, считавшиеся
    более «домовитыми» и придерживавшиеся умеренной середины, в ряде вопросов проявляли большую гибкость, чем суровые фламандцы.
    Со временем эти подразделения дробились на ещё более мелкие фракции, что отражало хроническую болезнь меннонитства XVI–XVII
    веков — склонность к расколам из-за разной меры строгости. К XVIII–XIX векам эти разделения постепенно сгладились, и большинство
    нидерландских меннонитских общин воссоединилось.
  sources:
  - menno_sann
  - estep
  datenote: условно — фризское крыло меннонитов (раскол 1567)
- id: flem
  title: Флемийцы
  sub: строгое крыло
  column: 6
  year: 1560
  branch: rad
  info: 'Фламандцы (Flemings) — строгое крыло меннонитов, обособившееся при расколе 1567 года, когда бежавшие от испанских
    преследований выходцы из Фландрии разошлись с местными фризскими общинами. Спор начался с бытовых и дисциплинарных разногласий,
    но перерос в принципиальный конфликт о строгости церковного отлучения (бана) и обязательности «избегания» отлучённых членов
    даже в семье и быту. Фламандцы отстаивали наиболее ригористическую линию: бескомпромиссную чистоту общины, неукоснительное
    применение отлучения и максимальное отделение от мира. Эта приверженность строгости делала их склонными к дальнейшим расколам,
    и именно из их среды в конце XVII века выделились амиши, нашедшие даже фламандскую дисциплину недостаточно последовательной.
    Противостояние строгих фламандцев и более умеренных фризов и ватерландцев определяло внутреннюю историю меннонитства на
    протяжении более чем столетия.'
  sources:
  - menno_sann
  - estep
  edges:
  - to: ami
    type: solid
    label: строгое крыло
    info: Амиши откололись от строгого (флемийского) крыла меннонитов ради ещё более строгой дисциплины.
  datenote: условно — фламандское крыло меннонитов (раскол 1567)
- id: soc
  title: Социниане
  sub: Лелий и Фауст Социн · Польша
  column: 8
  year: 1565
  branch: rad
  info: Социниане — антитринитарное течение евангельских рационалистов, названное по именам итальянцев Лелия Социна (1525–1562)
    и его племянника Фауста Социна (Фаусто Соццини, 1539–1604), которые, ставя «священный разум» выше буквы Писания, отвергали
    Троицу, божественность Христа, первородный грех и заместительное искупление, сохраняя при этом строгий авторитет Писания.
    Лелий, образованный гуманист, поддерживал связи с реформаторами, а систематизатором учения стал Фауст, который в 1579
    году обосновался в Польше. Там, в Малой Польше, уже существовало унитарианское движение, и Фауст стал его признанным вождём
    как проповедник и писатель. Польские антитринитарии оформились в отдельную церковь «Польских братьев» (Ecclesia minor),
    отделившуюся от кальвинистов около 1565 года; их центром стал Раков с прославленной академией, типографией и общиной до
    тысячи студентов. Социнианство сочетало рационалистическую критику догматов с моральным ригоризмом и пацифизмом, став
    отдалённым предшественником позднейшего либерального богословия, но в XVI–XVII веках жестоко преследовалось и католиками,
    и протестантами.
  sources:
  - needham3
  - sannikov
  - macculloch
  edges:
  - to: unit
    type: solid
    info: Социнианство Фауста Социна вылилось в институциональное унитарианство с Раковским катехизисом 1605 года.
  datenote: отделение «Польских братьев»-социниан
- id: unit
  title: Унитарии (антитринитарии)
  sub: Раковский катехизис 1605
  column: 8
  year: 1605
  branch: rad
  info: 'Унитарии (антитринитарии) — общее обозначение радикалов-рационалистов, отрицавших догмат о Троице и единосущии Христа
    во имя «очищения» христианства разумом; в XVI веке это движение достигло институциональной зрелости в двух центрах — Польше
    и Трансильвании. В Польше его воплотили «Польские братья» во главе с Фаустом Социном, чьим вероисповедным памятником стал
    Раковский (социнианский) катехизис, изданный в Ракове в 1605 году (уже после смерти Социна) и систематически излагавший
    антитринитарное учение о Боге, Христе и спасении. Катехизис стал главным манифестом европейского унитаризма и вызвал гневное
    осуждение всех ортодоксальных церквей. Расцвет польского унитаризма был недолгим: в 1638 году иезуиты добились закрытия
    раковской академии и общины, а в 1658 году сейм под угрозой смертной казни изгнал социниан из страны, после чего они рассеялись
    по Трансильвании, Нидерландам, Англии и позднее Северной Америке. Тем самым унитаризм пережил гибель своего польского
    центра и стал одним из источников новоевропейской религиозной мысли о веротерпимости.'
  sources:
  - needham3
  - sannikov
  - macculloch
  site: https://www.uua.org/
  datenote: Раковский катехизис — манифест унитаризма
- id: ami
  title: Амиши
  sub: Якоб Амман
  column: 6
  year: 1693
  branch: rad
  info: 'Амиши — наиболее консервативное ответвление меннонитского анабаптизма, возникшее в 1693 году в результате раскола,
    инициированного эльзасским старейшиной Якобом Амманом (ок. 1644 — ок. 1730) внутри швейцарско-эльзасских общин строгого
    фламандского толка. Амман требовал более частого совершения Вечери Господней и омовения ног, а главное — настаивал на
    буквальном «избегании» (Meidung) отлучённых: с отступником надлежало порвать всякое общение, включая семейное и застольное.
    Когда умеренные старейшины во главе с Хансом Райстом отказались принять столь суровую практику, Амман отлучил их самих,
    и разрыв стал необратимым. Так амиши обособились как ревнители первоначальной строгости, сохранив пацифизм, крещение по
    вере и отделение от мира, но добавив подчёркнутую простоту быта и недоверие к новшествам. С XVIII века, спасаясь от преследований,
    амиши массово переселялись в Северную Америку, прежде всего в Пенсильванию, где их общины сохраняют традиционный уклад
    до наших дней.'
  sources:
  - menno_sann
  - sannikov
  - estep
  live: true
  datenote: раскол Якоба Аммана — возникновение амишей

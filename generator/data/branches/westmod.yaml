- id: neoorth
  title: Неоортодоксия
  sub: диалектическое богословие
  column: 6
  year: 1921
  branch: mod
  info: 'Реакция на либеральную теологию: К. Барт («Послание к Римлянам», 1921) и Э. Бруннер вернули в центр богословия Бога
    и Откровение, «всецелую инаковость Бога».'

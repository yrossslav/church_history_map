- id: rcc
  title: Папство · Запад
  sub: Григорий I · Рим
  column: 1
  year: 700
  branch: root
  info: 'Римско-католическая церковь средневекового Запада: рост папства (от Григория Великого), латинское богослужение, союз
    с империей, монашеские ордена и схоластика.'
  sources:
  - sannikov
  - schaff6
  - needham3
  edges:
  - to: benmon
    type: solid
    info: Западная церковь опиралась на бенедиктинское монашество и клюнийскую реформу, обновлявшие духовную жизнь Запада.
  - to: scholast
    type: solid
    label: университеты
    info: Под эгидой Рима при соборных школах и университетах выросла схоластика — синтез веры и аристотелевской философии.
  - to: francis
    type: solid
    label: нищенств. ордена
    info: Рим утвердил францисканцев как нищенствующий орден проповеди, бедности и милосердия внутри католической церкви.
  - to: domin
    type: solid
    info: Рим утвердил доминиканцев — нищенствующий орден проповедников и учёных, позднее обслуживавший инквизицию.
  - to: waldens
    type: dash
    label: протест бедноты
    info: Реакцией на богатство Рима стало мирянское «движение бедноты» вальденсов, отколовшееся и осуждённое как ересь.
  - to: concil
    type: solid
    label: кризис папства
    info: Кризис папства и Великая схизма породили соборное движение, пытавшееся поставить Вселенский собор выше папы.
  - to: lacath
    type: solid
    label: конкиста
    info: Рим распространил католичество в Латинскую Америку вместе с испано-португальской конкистой и колонизацией.
  - to: missiongerm
    type: dash
    label: под эгидой Рима
    info: Миссия к германцам велась под эгидой Рима, через Бонифация связавшего новые епархии с папским престолом.
  - to: carol
    type: solid
    label: союз с папством
    info: Папство заключило союз с Франкской державой Карла Великого, давший Каролингское возрождение церковной жизни.
  - to: beguine
    type: dash
    label: надзор Церкви
    info: Полумонашеские общины бегинок возникали под надзором церкви, которая то терпела, то осуждала их как еретиков.
  - to: sav
    type: dash
    label: обличение папства
    info: Доминиканец Джироламо Савонарола во Флоренции громил роскошь и испорченность папства — предтеча Реформации.
  site: https://www.vatican.va/
  datenote: условно — папство Григория Великого как точка отсчёта
- id: benmon
  title: Западное монашество
  sub: Бенедикт · Клюни
  column: 2
  year: 910
  branch: root
  info: 'Западное монашество: устав прп. Бенедикта Нурсийского (~540) и клюнийская реформа (X в.) обновили церковную и духовную
    жизнь Запада.'
  sources:
  - sannikov
  - schaff6
  - needham3
  datenote: основание аббатства Клюни, клюнийская реформа
- id: scholast
  title: Схоластика
  sub: Фома Аквинский · университеты
  column: 2
  year: 1150
  branch: root
  info: 'Схоластика — средневековое университетское богословие (Ансельм, Пётр Ломбардский, Фома Аквинский): синтез веры и
    аристотелевской философии.'
  sources:
  - sannikov
  - schaff6
  - needham3
  datenote: условно — расцвет схоластики XII в.
- id: francis
  title: Францисканцы
  sub: Франциск Ассизский
  column: 3
  year: 1210
  branch: root
  info: Францисканцы (с 1209, Франциск Ассизский) — нищенствующий орден проповеди, бедности и милосердия.
  sources:
  - sannikov
  - schaff6
  - needham3
  site: https://ofm.org/
  datenote: устное одобрение устава францисканцев Иннокентием III
- id: domin
  title: Доминиканцы
  sub: проповедники · инквизиция
  column: 4
  year: 1216
  branch: root
  info: Доминиканцы (с 1216, св. Доминик) — орден проповедников и учёных; позднее связан с инквизицией.
  sources:
  - sannikov
  - schaff6
  - needham3
  edges:
  - to: rhinemyst
    type: solid
    label: доминиканская среда
    info: Рейнская спекулятивная мистика Экхарта, Таулера и Сузо выросла именно в доминиканской учёной среде Германии.
  site: https://www.op.org/
  datenote: утверждение ордена доминиканцев папой Гонорием III
- id: concil
  title: Соборное движение
  sub: Констанц · Базель
  column: 2
  year: 1414
  branch: root
  info: Соборное движение (XV в., Констанцский и Базельский соборы) — попытка поставить Вселенский собор выше папы ради преодоления
    Великой схизмы.
  sources:
  - sannikov
  - schaff6
  - needham3
  datenote: открытие Констанцского собора

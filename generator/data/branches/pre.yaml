- id: wyc
  title: Джон Уиклиф
  sub: лолларды · †1384
  column: 0
  year: 1380
  branch: pre
  info: 'Джон Уиклиф (ок. 1330–1384), оксфордский профессор, прозванный «утренней звездой Реформации», за полтора века до
    Лютера выдвинул почти все её ключевые тезисы. В трактате «Истина Священного Писания» (1378) он провозгласил Писание высшим
    авторитетом, стоящим выше соборов, отцов и папы, предвосхитив принцип sola Scriptura. Его «доминиальная теория» учила,
    что всякая законная власть и владение обусловлены состоянием благодати, откуда следовал вывод: погрязший в грехе клир
    теряет право на богатства. В сочинениях «О церкви» и «О власти папы» (1379) он определял истинную церковь как сообщество
    предопределённых ко спасению, известное лишь Богу, что подрывало отождествление церкви с папской иерархией. Самым опасным
    было его отрицание пресуществления: хлеб и вино остаются по природе хлебом и вином, что покушалось на сам нерв священнической
    власти. Он рассылал странствующих «бедных проповедников» и вдохновил первый полный перевод Библии на английский с Вульгаты
    (ок. 1382–1395). Его последователи-лолларды, загнанные в подполье статутом 1401 года, дожили до Реформации; в 1415 году
    Констанцский собор посмертно осудил Уиклифа, а в 1428 году его останки выкопали, сожгли и развеяли над рекой.'
  sources:
  - needham3
  - schaff6
  - mcgrath_thought
  - sannikov
  edges:

- id: mor
  title: Богемские / Моравские братья
  sub: XV век
  column: 0
  year: 1457
  branch: pre
  info: 'Богемские (Чешские, Моравские) братья — Unitas Fratrum, «Братское единение» — возникли около 1457 года в деревне
    Кунвальд, когда последователи Петра Хельчицкого во главе с братом Григорием объединились с остатками радикальных гуситов-таборитов.
    Богословски они восходили к Яну Гусу и к пацифистскому, библицистскому учению Хельчицкого: отказавшись от оружия, они
    стремились устроить жизнь в евангельской чистоте, настаивая, что единственным правилом веры может быть лишь Священное
    Писание. Доктринально братья были радикальнее умеренных утраквистов — они отвергли пресуществление, молитвы за мёртвых
    и призывание святых, выстроив собственное церковное устройство с выборными священниками и епископами. К началу Реформации
    общину составляли около 400 приходов и до 200 тысяч членов; в 1579–1594 годах они издали знаменитую Кралицкую Библию —
    самый популярный чешский перевод Писания. Их виднейшим деятелем стал последний епископ единения Ян Амос Коменский. Разгромленные
    после Белой Горы (1620) и загнанные в подполье Контрреформацией, уцелевшие братья в 1722 году бежали в Саксонию, где их
    традиция возродилась как гернгутерская Моравская церковь.'
  sources:
  - sannikov
  - schaff6
  - pravenc_gus
  - needham3
  edges:
  - to: her
    type: solid
    label: обновление 1722

    type: dash
    label: идеи Уиклифа
- id: hus
  title: Ян Гус
  sub: гуситы · †1415
  column: 0
  year: 1415
  branch: pre
  info: 'Ян Гус (ок. 1370/1372–1415), чех из крестьянской семьи, магистр (1396), пресвитер (1400) и ректор Пражского университета
    (1402–1403), стал главным распространителем идей Уиклифа в Богемии, привезённых туда Иеронимом Пражским. С 1402 года он
    проповедовал по-чешски в Вифлеемской часовне, обличая симонию, роскошь и пороки клира. Кутногорский декрет 1409 года дал
    чехам перевес в университете и спровоцировал исход около двух тысяч немцев. Главный его труд — «О церкви» (1413), где
    истинная церковь определяется как совокупность предопределённых, а Христос, а не грешный папа, объявляется её главой;
    важно, что Гус, в отличие от Уиклифа, не отвергал пресуществление, а его реформа касалась причастия мирян под двумя видами
    (чаши). Несмотря на охранную грамоту императора Сигизмунда, по прибытии на Констанцский собор он был арестован и, отказавшись
    отречься без доказательств из Писания, сожжён 6 июля 1415 года; в 1416 году ту же участь разделил Иероним Пражский. Казнь
    вызвала гуситские войны: «Четыре пражские статьи» (1420), пять отражённых крестовых походов, военный гений слепого Яна
    Жижки. В 1519 году Лютер на Лейпцигском диспуте принял ярлык «гусита» как почётный титул.'
  sources:
  - needham3
  - schaff6
  - sannikov
  - pravenc_gus

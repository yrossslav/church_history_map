- id: eras
  title: Эразм · гуманисты
  sub: греч. Новый Завет 1516
  column: 0
  year: 1516
  branch: pre
  info: 'Дезидерий Эразм Роттердамский (ок. 1466–1536) — незаконнорождённый сын нидерландского священника, воспитанник школы
    Братьев общей жизни в Девентере, где впитал дух Devotio Moderna: убеждение, что истинная религия есть дело сердца, а Христос
    — живой образец для подражания. Прозванный «князем гуманистов» и «учителем Европы», он почти единолично создал новую интеллектуальную
    атмосферу Запада: написал около 226 сочинений, среди которых сатира «Похвала глупости» (1509) и программный «Энхиридион»
    (1503) с призывом реформировать церковь через возврат к Писанию и отцам. Его сердцевинной идеей была philosophia Christi
    — возвращение к простому, деятельному христианству Нагорной проповеди вместо схоластических силлогизмов и обрядового формализма.
    Главным трудом стал первый печатный греческий Новый Завет (Novum Instrumentum, 1516) с новым латинским переводом, выявивший
    ошибки Вульгаты и давший реформаторам — Лютеру и Тиндейлу — текстологический фундамент. Сочувствуя ранней критике индульгенций,
    Эразм тем не менее отверг разрыв с Римом, а в 1524 году в трактате «О свободе воли» выступил против Лютера; Лютер ответил
    «О рабстве воли» (1525). Он умер в протестантском Базеле одинокой фигурой — отвергнутой католиками за то, что «снёс яйцо,
    которое высидел Лютер», и протестантами за отказ примкнуть к Реформации.'
  sources:
  - needham3
  - mcgrath_thought
  - schaff6
  - macculloch
  edges:
  - to: lut
    type: dash
    label: греч. НЗ · «снёс яйцо»
    info: Греческий Новый Завет Эразма (1516) дал реформаторам оружие; но в споре о свободе воли (1524–25) Эразм и Лютер разошлись.
- id: her
  title: Гернгутеры
  sub: обновл. моравские братья
  column: 0
  year: 1722
  branch: pre
  info: 'Гернгутеры, или обновлённая Моравская церковь (Herrnhuter Brüdergemeine), возникли в 1722 году, когда гонимые потомки
    Богемских братьев получили убежище в саксонском имении у графа Николая Людвига фон Цинцендорфа (1700–1760) и основали
    поселение Гернгут («Под охраной Господа»). Цинцендорф, знатный пиетист, воспитанный в школе Франке в Галле, стал с 1727
    года их духовным вождём; 13 августа 1727 года община пережила глубокое духовное пробуждение, считающееся днём возрождения
    Братского единения. Гернгут мыслился как «новое монашество без обетов» с полным посвящением Христу, с живым, сердечным,
    христоцентричным благочестием и непрерывной молитвой. К 1742 году Моравская церковь была признана самостоятельной деноминацией.
    Главным её вкладом стал беспрецедентный миссионерский порыв: гернгутеры первыми среди протестантов отправили миссионеров
    в Вест-Индию, Гренландию, Африку и к индейцам Северной Америки. Именно встреча с моравскими братьями во время бури на
    пути в Джорджию и затем в Лондоне потрясла Джона Уэсли и подтолкнула его к обращению 1738 года — так гернгутерское благочестие
    повлияло на рождение методизма.'
  sources:
  - sannikov
  - needham3
  - macculloch

- id: assyr
  title: Церковь Востока
  sub: несториане · Персия, Азия
  column: -6
  year: 431
  branch: east
  info: Церковь Востока («несторианская»), не принявшая Эфесский собор 431 г.; широкая миссия в Персии, Средней Азии, Индии

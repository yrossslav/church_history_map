- id: tyn
  title: Уильям Тиндейл
  sub: англ. Библия · †1536
  column: 10
  year: 1526
  branch: eng
  info: 'Уильям Тиндейл (1494–1536) — оксфордский и кембриджский учёный, поставивший целью дать англичанам Писание на родном
    языке, переведённое не с латинской Вульгаты, а прямо с греческого (по изданию Нового Завета Эразма Роттердамского 1522
    г.) и древнееврейского оригинала, с оглядкой на немецкий перевод Лютера; ему приписывают слова, ставшие девизом английской
    Реформации: «Я сделаю так, что мальчик за плугом будет знать Писание лучше, чем знаешь ты». Не найдя покровительства у
    английских епископов, в 1524 году он уехал в Германию, а в 1526 году напечатал в Вормсе полный английский Новый Завет,
    тысячи экземпляров которого тайно ввозились в Англию в тюках с тканью. Его переводческие решения были богословски заряжены:
    «церковь» он передавал как «собрание», «священник» — как «старейшина», «делать покаяние» — как «раскаяться», подрывая
    привычную католическую картину мира. В 1530 году в Антверпене вышло его Пятикнижие. В мае 1535 года Тиндейла предал английский
    шпион, а в октябре 1536 года в замке Вильворде близ Брюсселя его задушили и сожгли; по преданию, последними словами были:
    «Господи, открой глаза королю Англии!» Около девяноста процентов его текста вошло в Библию короля Иакова (1611).'
  sources:
  - needham3
  - saprykin
  - macculloch
  edges:
  - to: ang
    type: dash
    label: англ. Библия
    info: Английская Библия Тиндейла подготовила почву для национальной Англиканской церкви и вошла в её традицию.
  datenote: печать английского Нового Завета Тиндейла в Вормсе
- id: ang
  title: Англиканская церковь
  sub: Генрих VIII · via media
  column: 10
  year: 1534
  branch: eng
  info: 'Англиканская церковь родилась не из богословского прозрения, а из династической нужды: Генрих VIII, добиваясь от
    папы аннулирования брака с Екатериной Арагонской и получив отказ, провёл через парламент в 1529–1536 годах серию законов,
    оборвавших связи с Римом, кульминацией которых стал Акт о супрематии (1534), объявивший короля «единственным верховным
    главой на земле церкви Англии». При этом сам Генрих оставался богословским консерватором — «Шесть статей» (1539) вновь
    утвердили пресуществление и целибат под страхом смерти. Подлинная доктринальная реформа развернулась при Эдуарде VI (1547–1553)
    трудами архиепископа Томаса Кранмера, создавшего «Книгу общих молитв», но была прервана католической реакцией Марии Тюдор.
    Окончательное «елизаветинское устроение» 1559 года стало компромиссным: Акт о супрематии и Акт о единообразии, а затем
    «Тридцать девять статей» (1563/1571) закрепили умеренно-кальвинистское вероучение при сохранении епископата. Так сложилась
    via media — «средний путь» между Римом и Женевой, богословское обоснование которого дал Ричард Хукер на трёх основаниях:
    Писание, разум и церковная традиция.'
  sources:
  - needham3
  - mcgrath_thought
  - saprykin
  live: true
  edges:
  - to: pur
    type: solid
    info: Внутри Англиканской церкви возникли пуритане, добивавшиеся её очищения от католических остатков.
  - to: qua

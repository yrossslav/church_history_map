    label: идейная близость
    info: Учение духоборов идейно близко английским квакерам (отрицание первородного греха, «внутренний свет») и анабаптистам.
- id: met
  title: Методисты
  sub: Дж. Уэсли · влияние гернгутеров
  column: 10
  year: 1738
  branch: eng
  info: 'Методисты — движение религиозного пробуждения, возникшее в XVIII веке внутри Англиканской церкви усилиями Джона Уэсли
    (1703–1791), его брата Чарльза и Джорджа Уайтфилда. Решающим для Уэсли стал духовный кризис, разрешившийся 24 мая 1738
    года: на собрании на улице Олдерсгейт в Лондоне, слушая чтение предисловия Лютера к «Посланию к Римлянам», он почувствовал,
    что «верит в Христа, только в Христа, ради своего спасения». Вскоре после обращения Уэсли посетил гернгутское поселение
    моравских братьев в Саксонии под покровительством графа Цинцендорфа, и опыт гернгутеров глубоко повлиял на устройство
    методистских обществ. По возвращении Уэсли развернул проповедь живой личной веры и святости, организуя верующих в «общества»,
    «классы» и «соединения» с дисциплиной и взаимным душепопечением — отсюда и прозвище «методисты». Богословски Уэсли стоял
    на арминианских позициях, подчёркивая всеобщность искупления, что развело его с кальвинистом Уайтфилдом. Хотя сам Уэсли
    до конца жизни считал себя англиканином, методизм после его смерти оформился в самостоятельную деноминацию, ставшую одной
    из крупнейших протестантских традиций мира.'
  sources:
  - pravenc_method
  - sannikov
  live: true
  edges:

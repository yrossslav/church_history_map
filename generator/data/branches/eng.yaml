- id: pur
  title: Пуритане
  sub: У. Перкинс · реформа изнутри
  column: 10
  year: 1565
  branch: eng
  info: 'Пуритане — те протестанты внутри Англиканской церкви, которые, вернувшись из цюрихского и женевского изгнания времён
    Марии Тюдор, добивались её дальнейшего «очищения» от остатков католицизма по континентальному образцу. Само прозвище возникло
    как насмешливый ярлык в ходе «спора об облачениях» 1560-х годов: их возмущали епископальная иерархия, сурплис, поклон
    при имени Христа. Большинство пуритан не думали о разрыве с государственной церковью — они стремились к пресвитерианскому
    строю, более строгой проповеди и лучшей подготовке пасторов. Кузницей пуританских проповедников стал Кембридж, прежде
    всего Эммануэль-колледж (основан в 1584 году); особым авторитетом пользовался Уильям Перкинс (1558–1602), чьё «Искусство
    пророчествования» стало стандартным руководством по проповеди. Этот импульс породил одновременно строителей Вестминстерского
    исповедания и отцов американской конгрегационалистской демократии, а в XVII веке вылился в гражданскую войну.'
  sources:
  - needham4
  wide:
  - 9
  - 11
  edges:
  - to: cartw
    type: solid
    label: пресвит. партия
    info: Внутри пуританства сложилась пресвитерианская партия Картрайта, требовавшая замены епископата.
  - to: indep
    type: solid
    label: разделение пуритан
    info: Из пуритан выделились индепенденты-конгрегационалисты, отстаивавшие самоуправление поместных общин.
  - to: separ
    type: solid
    info: Сепаратисты — наиболее радикальное крыло пуритан, решившее не реформировать, а покинуть государственную церковь.
  datenote: условно — «спор об облачениях», оформление пуританства
- id: cartw
  title: Пресвитериане
  sub: Т. Картрайт
  column: 9
  year: 1572
  branch: eng
  info: Томас Картрайт — профессор богословия Кембриджа, лидер пресвитерианской партии внутри пуританского движения, познакомившийся
    с женевскими образцами непосредственно. Он проповедовал, что пресвитерианское устройство церкви — единственно библейское
    и должно заменить епископат, опираясь на авторитет Писания как нормы не только вероучения, но и церковного строя. Практическим
    воплощением его идей стало собрание в 1572 году тайных «классисов» — пресвитерий, действовавших внутри Англиканской церкви.
    Именно это давление снизу питало пуританское движение, которому спустя поколение предстояло превратиться в революционную
    силу. Учеником Картрайта был Роберт Браун, теоретик сепаратизма. Таким образом пресвитерианский радикализм Картрайта парадоксальным
    образом стал одной из отправных точек для движения, ушедшего ещё дальше — к полному разрыву с государственной церковью.
  sources:
  - needham4
  edges:
  - to: uspresb
    type: solid
    label: пресвитериане США
    info: Английское пресвитерианство Картрайта стало истоком пресвитерианских церквей США.
  datenote: тайные пресвитерии-«классисы» Картрайта
- id: indep
  title: Индепенденты
  sub: конгрегационалисты
  column: 10
  year: 1581
  branch: eng
  info: Индепенденты (конгрегационалисты) — течение английского пуританства, отстаивавшее самоуправление каждой поместной
    общины, независимой и от епископа, и от пресвитерианского синода. В отличие от пресвитериан, стремившихся к единой национальной
    церкви с принуждением к единообразию, индепенденты сражались за свободу совести для всех протестантов. В годы гражданской
    войны они составляли меньшинство в Вестминстерской ассамблее, но большинство в Новой Образцовой Армии, и после «Прайдовой
    чистки» 1648 года власть перешла к ним; крупнейшей фигурой движения стал индепендент Оливер Кромвель (1599–1658), лорд-протектор
    Англии. Крупнейшим богословом конгрегационализма был Джон Оуэн (1616–1683), лично добившийся освобождения Джона Буньяна
    из тюрьмы. В 1658 году конгрегационалисты приняли Савойскую декларацию. Перенесённый в Северную Америку лейденскими пилигримами
    и такими проповедниками, как Джон Коттон и Томас Хукер, конгрегационализм породил Кембриджскую платформу (1648) и стал
    господствующей формой христианства в английских колониях.
  sources:
  - needham4
  edges:
  - to: congreg
    type: solid
    label: Новая Англия
    info: Английский конгрегационализм был перенесён в Новую Англию и стал господствующей формой колониального христианства.
  - to: part
    type: solid
    label: из индепендентов
    info: Кальвинистские частные баптисты выделились из конгрегационалистской (индепендентской) общины Джейкоба–Лэтропа–Джесси
      в Лондоне.
  datenote: условно — ранний сепаратизм Брауна, истоки конгрегационализма
- id: separ
  title: Сепаратисты
  sub: Р. Браун · браунисты
  column: 11
  year: 1582
  branch: eng
  info: 'Сепаратисты — та решительная часть пуританского движения, которая пришла к выводу, что государственная Англиканская
    церковь есть подлинная «лжецерковь», которую нужно не реформировать, а покинуть. Один из первых задокументированных случаев
    — раскрытое в июне 1567 года в лондонском «Пламберс-Холле» собрание около ста человек. Ключевым теоретиком стал Роберт
    Браун (1550–1633), ученик Картрайта, опубликовавший в 1582 году трактат «О реформации, не дожидаясь никого»: ждать разрешения
    епископов или парламента — значит впадать в греховное «промедление», тогда как Писание требует немедленного действия.
    Церковь, по Брауну, — это добровольное собрание верующих, связанных с Богом и друг с другом заветным обязательством, причём
    каждая конгрегация самоуправляема. Сам Браун под конец жизни вернулся в государственную церковь, но более трагической
    оказалась судьба Генри Барроу и Джона Гринвуда, написавших в тюрьме важнейшие памятники раннего сепаратизма и казнённых
    в апреле 1593 года.'
  sources:
  - needham4
  edges:
  - to: pilg
    type: solid
    label: → Плимут 1620
    info: Из сепаратистов вышли отцы-пилигримы, основавшие в 1620 году Плимутскую колонию.
  - to: smi
    type: solid
    label: + меннониты
    info: Из английских сепаратистов вышел Джон Смит; решающим стало влияние нидерландских меннонитов (ватерландцев) — так
      родился баптизм.
  datenote: трактат Роберта Брауна «О реформации, не дожидаясь никого»
- id: pilg
  title: Церковь Пилигримов
  sub: «Мэйфлауэр» → Плимут
  column: 11
  year: 1620
  branch: eng
  info: '«Отцы-пилигримы» — группа гонимых сепаратистов, искавших убежища в веротерпимых Нидерландах, где в Лейдене сложилась
    община под пастырством Джона Робинсона (ок. 1576–1625). Именно из этой общины вышли эмигранты, которых потомки назвали
    пилигримами: Уильям Брадфорд (1590–1657) и Уильям Брустер (ок. 1560–1643) возглавили группу в 102 человека, поднявшихся
    на борт барка «Мейфлауэр». 6 сентября 1620 года корабль вышел из Плимута и через два месяца достиг берегов Новой Англии,
    где было основано Плимутское поселение. Прощальная проповедь Робинсона стала знаменитым духовным завещанием: он просил
    следовать за ним не далее, чем он следует за Христом, ибо «Господь имеет ещё больше истины и света, которые должны выйти
    из Его святого Слова». Сам Робинсон до Америки так и не добрался — он умер в Лейдене в 1625 году. Плимутская колония стала
    отправной точкой разветвлённого конгрегационального движения в английских колониях.'
  sources:
  - needham4
  datenote: «Мэйфлауэр» и основание Плимутской колонии
  edges:
  - to: congreg
    type: solid
    label: → Новая Англия
    info: Плимутская колония пилигримов стала отправной точкой конгрегационализма в Новой Англии.
- id: qua
  title: Квакеры
  sub: Джордж Фокс
  column: 9
  year: 1650
  branch: eng
  info: 'Квакеры (Общество друзей) возникли на крайнем левом фланге революционного религиозного брожения 1640-х годов — внутри
    кружка пуритан-индепендентов. Основателем движения стал Джордж Фокс (1624–1691), переживший около 1646 года мистический
    опыт: «Я услышал голос, который сказал: „Есть Один, Христос Иисус, который может говорить к твоему состоянию“». Центральным
    учением Фокса стал «внутренний свет» — данная каждому человеку мера света, которая, если ей следовать, ведёт к полному
    Свету Жизни; возвышение непосредственного духовного опыта над доктриной и даже над Писанием неизбежно влекло конфликты
    с ортодоксальными протестантами. Прозвище «квакеры» («трясущиеся») появилось в 1650 году. Квакеры отвергли таинства, фиксированные
    литургии и иерархию священства; их богослужение — молчаливое ожидание движения Духа, в котором свидетельствовать мог любой,
    включая женщин. С 1660 года они стали строгими пацифистами, отвергавшими присягу и войну, за что жестоко преследовались;
    в 1681 году Уильям Пенн получил земли в Северной Америке, где основал Пенсильванию.'
  sources:
  - needham4
  - sannikov
  live: true
  site: https://fwcc.world/
  datenote: появление прозвища «квакеры» при Джордже Фоксе
  edges:

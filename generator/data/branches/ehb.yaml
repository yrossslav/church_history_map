- id: onc
  title: Немецкий (континент.) баптизм
  sub: Иоганн Онкен
  column: 14
  year: 1834
  branch: ehb
  info: 'Иоганн Герхард Онкен (1800–1884) — «отец континентального баптизма» и родоначальник европейского евангельского пробуждения.
    Воспитанный в лютеранской семье, он подростком попал в Шотландию, где пережил обращение, а в 1823 году вернулся в Гамбург
    и начал проповедовать в домашних кружках, распространяя Писание через собственный книжный магазин. 22 апреля 1834 года
    Онкен, его жена и ещё пятеро братьев были крещены в реке Эльбе американским баптистом профессором Барнасом Сирсом — с
    этого крещения немецкий баптизм ведёт своё начало. Несмотря на враждебность лютеранского духовенства и разгром собраний,
    жертвенная помощь его общины погорельцам после большого пожара в Гамбурге (1842) завоевала расположение горожан, и к 1845
    году в городе было около 400 баптистов. Вместе с другом Г. В. Леманном, основавшим церковь в Берлине, Онкен совершал миссионерские
    поездки в Данию, Литву, Румынию и другие страны: к 1851 году в Европе насчитывалось свыше 40 общин и более 4000 верующих.
    В 1880 году он открыл в Гамбурге богословскую семинарию; его девиз «каждый баптист — миссионер» стал программой континентального
    движения.'
  sources:
  - sannikov
  - savinsky
  - needham4
  edges:
  - to: rub
    type: solid
    info: Континентальный баптизм Онкена дал богословский и организационный импульс созданию Союза русских баптистов.
  - to: sht
    type: dash
    label: нем. колонисты
    info: Через немецких колонистов-меннонитов онкеновский баптизм повлиял на возникновение штундизма на юге России.
  datenote: крещение Онкена в Эльбе — начало немецкого баптизма
- id: sht
  title: Штундизм
  sub: юг России · меннон. колонии
  column: 14
  year: 1862
  branch: ehb
  info: 'Штундизм — раннее евангельское пробуждение на юге Российской империи (Украина, 1860-е годы), название которого происходит
    от немецкого Stunde («час») — часы дополнительных назидательных собраний для чтения Библии по образцу соседних немецких
    меннонитских и реформатских колоний. Первые группы возникли в деревне Основа Одесского уезда, где православные крестьяне
    под влиянием колонистов и реформатского пастора Карла Бонекемпера из колонии Рорбах собирались для чтения Писания, поначалу
    не порывая с православной церковью. Физические расправы со стороны духовенства вынудили штундистов к разрыву с официальной
    церковью, после чего движение быстро распространилось: к 1870 году в Карловке и Любомирке насчитывалось около 70 крещёных.
    Из этой среды вышли виднейшие миссионеры — Ефим Цимбал, Иван Рябошапка (1831–1900), Михаил Ратушный. Власти и народ собирательно
    клеймили всех русских протестантов кличкой «штунда», объявив их «особо опасными»; со временем штундизм слился с русско-украинским
    баптизмом.'
  sources:
  - sannikov
  - savinsky
  edges:
  - to: rub
    type: solid
    info: Штундистское пробуждение юга России слилось с баптизмом и вошло в Союз русских баптистов.
  datenote: возникновение штундизма на юге России
- id: vor
  title: Н. Воронин · Тифлис
  sub: первое крещение в России
  column: 14
  year: 1867
  branch: ehb
  info: Никита Исаевич Воронин (1840–1905) — первый русский, принявший крещение по вере, и основатель Тифлисской общины, с
    которой началось распространение баптизма среди русских. Воронин происходил из молокан и, самостоятельно изучая русский
    Новый Завет, пришёл к убеждению, что спасение возможно только по вере, а не по добрым делам; пережив обращение, он стал
    искать того, кто преподал бы ему водное крещение. Через книгоношу Якова Делякова он встретился с приехавшим из Литвы баптистом
    Мартином Кальвейтом, и в ночь на 20 августа 1867 года Кальвейт крестил Воронина в реке Куре в Тифлисе. До этого баптистские
    собрания в Тифлисе посещали лишь немцы, литовцы и другие иностранцы — крещение Воронина положило начало активному развитию
    баптизма среди самих русских. Вскоре Воронин крестил многих друзей-молокан, и через четыре года в Тифлисе существовала
    община из двенадцати человек; в неё в 1871 году вошёл Василий Павлов (1854–1924) — будущий виднейший идеолог русского
    баптизма.
  sources:
  - sannikov
  - savinsky
  edges:
  - to: rub
    type: solid
    info: От Тифлисской общины Воронина пошла кавказская ветвь, образовавшая Союз русских баптистов.
  datenote: первое крещение русского по вере (Воронин в Тифлисе)

- id: rub
  title: Союз русских баптистов
  sub: с. Ново-Васильевка
  column: 14
  year: 1884
  branch: ehb
  info: 'Союз русских баптистов — первое национальное объединение русских баптистских церквей, учреждённое в 1884 году на
    съезде в селе Ново-Васильевка Таврической губернии. Его создание стало результатом стремления разрозненных евангельско-баптистских
    ветвей, почти одновременно и независимо возникших на Кавказе, в Украине и Петербурге, найти пути взаимодействия. Первым
    председателем избрали Иоганна Виллера, а после его высылки из России Союз на десятилетия возглавил Дей Иванович Мазаев.
    Союз не был руководящим органом и не управлял поместными церквами, которые сохраняли автономию, — он создавался для координации
    миссионерской, благотворительной, издательской и образовательной работы, непосильной отдельной общине. Учреждение Союза
    совпало с эпохой жестоких гонений: многих служителей ссылали в Закавказье и иные глухие места, а Василия Павлова в 1891
    году выслали в Оренбургский край.'
  sources:
  - sannikov
  - savinsky
  edges:
  - to: vse
    type: solid
    info: Союз русских баптистов в 1944 году слился с евангельскими христианами во Всесоюзный совет (ВСЕХБ).
  datenote: учреждение Союза русских баптистов в Ново-Васильевке
- id: pro
  title: Евангельские христиане
  sub: И. Проханов · ВСЕХ
  column: 14
  year: 1909
  branch: ehb
  info: Евангельские христиане — петербургская ветвь русского евангельского движения, организационно оформленная Иваном Степановичем
    Прохановым (1869–1935). Проханов — духовный писатель, поэт, издатель и инженер — учился в Санкт-Петербургском технологическом
    институте, а с 1898 года издавал за границей журнал «Беседа». Движение восходило к «петербургскому пробуждению» 1870-х
    годов, связанному с проповедью лорда Г. Редстока и обращением аристократии (В. А. Пашков). В результате работы съездов
    1907, 1908 и 1909 годов был создан Всероссийский союз евангельских христиан (ВСЕХ) во главе с Прохановым — параллельный
    Союзу баптистов, при близости вероучения отличавшийся более гибкой организацией. Богословски евангельские христиане и
    баптисты расходились в частностях (например, в вопросах рукоположения и устройства церкви), что долго препятствовало их
    слиянию, но в советский период гонений сблизило обе ветви.
  sources:
  - sannikov
  - savinsky
  edges:
  - to: vse
    type: solid
    label: ев. христиане
    info: Евангельские христиане Проханова в 1944 году объединились с баптистами в единый ВСЕХБ.
  datenote: создание Всероссийского союза евангельских христиан Прохановым
- id: vse
  title: ВСЕХБ
  sub: баптисты + ев. христиане
  column: 14
  year: 1944
  branch: ehb
  info: 'Всесоюзный совет евангельских христиан-баптистов (ВСЕХБ) был образован на объединительном съезде в Москве 26–29 октября
    1944 года, когда в условиях частичной легализации религиозной жизни военного времени слились два крупнейших течения русского
    протестантизма — евангельские христиане и баптисты. Председателем стал Яков Иванович Жидков, генеральным секретарём —
    Александр Васильевич Карев. Объединению предшествовали десятилетия жесточайших репрессий: с 1929 года арестовывались руководители
    союзов, конфисковывались молитвенные дома, а к 1936 году почти все общины были сняты с регистрации и собирались тайно.
    После войны во ВСЕХБ влились и другие евангельские группы — пятидесятники (по соглашению 1945 года), часть меннонитов.
    ВСЕХБ стал единственным легальным центром евангельского движения, действовавшим под жёстким государственным контролем
    через Совет по делам религиозных культов, что позднее породило внутренний конфликт.'
  sources:
  - sannikov
  - savinsky
  live: true
  edges:
  - to: scc
    type: solid
    label: раскол 1961
    info: Раскол 1961 года внутри ВСЕХБ привёл к образованию «отделённых» — Совета церквей ЕХБ.
  - to: rse
    type: solid
    info: Российская структура ВСЕХБ при распаде СССР оформилась в самостоятельный Российский союз ЕХБ.
  site: https://baptist.org.ru/
  datenote: образование ВСЕХБ на объединительном съезде в Москве
- id: scc
  title: Совет Церквей ЕХБ
  sub: раскол → МСЦ ЕХБ
  column: 15
  year: 1961
  branch: ehb
  info: Совет церквей ЕХБ (СЦ ЕХБ, «отделённые» баптисты) возник в результате раскола 1961–1963 годов внутри братства ЕХБ.
    Поводом стали принятые пленумом ВСЕХБ в декабре 1959 года «Положение о Союзе ЕХБ» и «Инструктивное письмо старшим пресвитерам»,
    которые под давлением Совета по делам религий фактически ограничивали евангелизацию, крещение молодёжи и приём новых членов,
    нарушая баптистские принципы. В 1960–1961 годах сложилась «Инициативная группа» во главе с пресвитером Геннадием Константиновичем
    Крючковым; в неё входили Алексей Фёдорович Прокофьев и другие, добивавшиеся созыва независимого всесоюзного съезда. Не
    добившись съезда, инициативники стали выходить из зарегистрированных церквей и создавать самостоятельные нелегальные общины;
    действовала подпольная типография «Христианин». Многие историки полагают, что власти сознательно спровоцировали раскол;
    покаяние руководства ВСЕХБ на совещаниях 1963 и 1966 годов разделения преодолеть уже не смогло, и СЦ ЕХБ остался на полулегальном
    положении вплоть до перестройки.
  sources:
  - sannikov
  - savinsky
  site: https://iucecb.com/
  datenote: раскол ЕХБ, образование Совета церквей
- id: rse
  title: Российский Союз ЕХБ
  sub: с 1991
  column: 14
  year: 1991
  branch: ehb
  info: Российский союз евангельских христиан-баптистов — преемник республиканской структуры ВСЕХБ на территории России, оформившийся
    как самостоятельный союз в 1990–1991 годах при распаде СССР и единого всесоюзного братства. С ослаблением антирелигиозного
    давления к концу 1980-х большая часть сторонников Совета церквей вернулась во ВСЕХБ или стала регистрироваться автономно,
    а в 1990–1991 годах из общего братства выделились пятидесятники и ряд других евангельских групп. На постсоветском пространстве
    возникло несколько крупных баптистских союзов; российские церкви объединились в Российский союз ЕХБ, ставший крупнейшим
    баптистским объединением страны. К этому времени догматика возрождённых объединений евангельских христиан стала по существу
    баптистской, что отражало завершившуюся за советский век консолидацию движения.
  sources:
  - sannikov
  - savinsky
  live: true
  site: https://baptist.org.ru/
  datenote: оформление Российского союза ЕХБ при распаде СССР
- id: dukhob
  title: Духоборы
  sub: духовное христианство
  column: 13
  year: 1740
  branch: ehb
  info: Русская секта «духовного христианства», сложившаяся в середине XVIII в. на юге России (у истоков — Силуан Колесников,
    ок. 1755). Отвергала «внешнюю» церковь, иконы, обряды и даже приоритет Писания — в пользу «внутреннего света» и устного
    предания. Учение идейно близко английским квакерам (отрицание первородного греха) и анабаптистам (отказ от крещения младенцев,
    общность имущества, пацифизм, неприятие государственной власти). Название «духоборцы» дал в 1785 г. архиепископ Екатеринославский
    Амвросий. В 1898–1899 около 7,5 тыс. переселились в Канаду; из духоборской среды выделились молокане.
  sources:
  - pravdukhob
  live: true
  edges:
  - to: molokan
    type: solid
    label: выделились молокане
    info: Из среды духоборов в XVIII веке выделилось молоканство, придавшее большее значение Писанию.
  site: https://uscc-doukhobors.org/
  datenote: учение Силуана Колесникова — «духовное христианство»

band_info:
  ana: Анабаптисты выросли из круга Цвингли в Цюрихе и порвали с ним в 1525 г., требуя церкви только из сознательно уверовавших.
  spirit: Спиритуалисты — радикальное течение, ставившее «внутреннее Слово» Духа выше внешнего Писания.
  soc: Евангельские рационалисты (социниане) — радикальное антитринитарное течение, ставившее разум выше буквы Писания.
hus_band: «мы все гуситы» (Лютер)
group_info:
  pre: 'Предшественники Реформации и христианские гуманисты, подготовившие почву: критика папства, возврат к Писанию, перевод
    Библии на родные языки.'
  lut: 'Лютеранство — старейшая ветвь Реформации (Лютер, Меланхтон): оправдание только верой, Аугсбургское исповедание; церкви
    Германии и Скандинавии.'
  ref: 'Реформатство (кальвинизм) — традиция Цвингли и Кальвина: суверенитет Бога, пресвитерианское устройство. Сюда входят
    гугеноты, шотландские пресвитериане, нидерландская реформатская церковь.'
  rad: 'Радикальная Реформация — отвергавшие союз церкви с государством. По классификации Уильямса: анабаптисты, спиритуалисты
    и евангельские рационалисты.'
  eng: Английская Реформация — от разрыва Генриха VIII с Римом (via media) до пуритан, индепендентов, сепаратистов, квакеров
    и методистов.
  bap: 'Баптисты — англо-американская традиция: крещение по вере, добровольная церковь, свобода совести (Джон Смит; общие
    и частные баптисты).'
  ehb: 'Российский ЕХБ — баптизм и евангельские христиане в России: от Воронина и штундизма к Союзу русских баптистов, ВСЕХБ
    и современным союзам.'
  contra: 'Контрреформация (католическая реформа) — ответ Рима: иезуиты, Тридентский собор, инквизиция; обновление изнутри
    и борьба с протестантизмом.'

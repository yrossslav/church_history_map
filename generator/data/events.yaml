33:
  info: Сошествие Святого Духа на апостолов в Иерусалиме (Деян 2); проповедь Петра и крещение около трёх тысяч — рождение
    христианской Церкви.
  key: true
  name: Пятидесятница — рождение Церкви
  sources:
  - sannikov
  - needham3
313:
  info: Константин и Лициний Миланским эдиктом даровали христианам свободу веры и вернули отнятое имущество; конец трёх веков
    гонений.
  key: true
  name: Миланский эдикт — конец гонений
  sources:
  - sannikov
  - needham3
  - macculloch
325:
  info: Первый Вселенский собор осудил арианство и утвердил единосущие (ὁμοούσιος) Сына Отцу — Никейский Символ веры; установил
    единое правило о дате Пасхи.
  key: false
  name: I Никейский собор · Троица
  sources:
  - sannikov
  - needham3
381:
  info: Второй Вселенский (I Константинопольский) собор подтвердил Никейский Символ, осудил духоборов-пневматомахов и утвердил
    Божество Святого Духа, завершив Никео-Цареградский Символ.
  key: false
  name: II Вселенский собор · Символ веры
  sources:
  - sannikov
  - needham3
431:
  info: Третий Вселенский (Эфесский) собор осудил несторианство и признал Деву Марию Богородицей (Θεοτόκος); повлёк отделение
    Церкви Востока.
  key: false
  name: Эфесский собор
  sources:
  - sannikov
  - needham3
451:
  info: Четвёртый Вселенский (Халкидонский) собор определил во Христе две природы «неслитно и нераздельно»; вызвал откол дохалкидонских
    (древневосточных) церквей.
  key: true
  name: Халкидонский собор · дохалкидонский раскол
  sources:
  - sannikov
  - needham3
  - macculloch
476:
  info: Низложение последнего западного императора Ромула Августула; на распадающемся Западе Церковь и папство становятся
    главной объединяющей силой среди варварских королевств.
  key: false
  name: Падение Западной Римской империи
  sources:
  - sannikov
  - needham3
589:
  info: III Толедский собор в вестготской Испании впервые вставляет «и от Сына» (filioque) в Символ веры для борьбы с арианством.
  name: 'Толедский собор: filioque'
  sources:
  - filioque_wiki
632:
  info: Смерть Мухаммеда и начало арабских завоеваний; вскоре от христианского мира отпали Сирия, Палестина, Египет и Северная
    Африка.
  key: false
  name: Возникновение ислама
  sources:
  - sannikov
  - needham3
664:
  info: Король Нортумбрии Осви решает спор кельтской и римской традиций (дата Пасхи, тонзура) в пользу Рима; поворот к единству
    английской церкви с континентом.
  name: Синод в Уитби
  sources:
  - whitby_britannica
787:
  info: Седьмой Вселенский (II Никейский) собор завершил первый период иконоборчества, восстановив иконопочитание как чествование
    первообраза, а не поклонение веществу.
  key: false
  name: VII Вселенский собор · иконы
  sources:
  - sannikov
  - needham3
800:
  info: Папа Лев III венчает Карла Великого императором — рождение Западной (будущей Священной Римской) империи и тесного
    союза папства с франкской державой.
  name: Коронация Карла Великого
  sources:
  - sannikov
  - needham3
863:
  info: Святые братья Кирилл и Мефодий начинают миссию в Великой Моравии, создав славянскую азбуку и богослужение на славянском
    языке — основа славянского христианства.
  name: Миссия Кирилла и Мефодия
  sources:
  - sannikov
988:
  info: Князь Владимир принял христианство из Византии и крестил Русь, которая вошла в орбиту восточного православия и славянской
    книжности.
  key: false
  name: Крещение Руси
  sources:
  - sannikov
  - needham3
1014:
  info: Filioque официально входит в Символ веры в самом Риме, завершая распространение франкской вставки на Запад; один из
    узлов будущего раскола 1054 г.
  name: Filioque в Риме
  sources:
  - filioque_wiki
1054:
  info: Взаимные анафемы легатов папы и Константинопольского патриарха закрепили разделение Церкви на католический Запад и
    православный Восток (споры о filioque и примате папы).
  key: true
  name: 'Великий раскол: Восток ↔ Запад'
  sources:
  - sannikov
  - needham3
  - macculloch
1095:
  info: Папа Урбан II на соборе в Клермоне призвал к освобождению Святой Земли — начало эпохи Крестовых походов.
  key: false
  name: Начало крестовых походов
  sources:
  - sannikov
  - needham3
1204:
  info: Четвёртый крестовый поход захватил и разграбил Константинополь, основав Латинскую империю; раскол между Востоком и
    Западом стал необратимым.
  key: false
  name: Крестоносцы берут Константинополь
  sources:
  - sannikov
  - needham3
1309:
  info: Резиденция пап перенесена в Авиньон под влияние французской короны (до 1377) — «авиньонское пленение», подорвавшее
    авторитет папства.
  key: false
  name: Авиньонское пленение пап
  sources:
  - sannikov
  - needham3
1378:
  info: 'Великая западная схизма: одновременно правят два (затем три) папы; раскол преодолён лишь Констанцским собором (1417).'
  key: false
  name: Великая западная схизма
  sources:
  - sannikov
  - needham3
1380:
  info: Джон Уиклиф (Оксфорд) учил, что Писание — высший авторитет, выше папы; организовал перевод Библии на английский и
    движение «бедных проповедников» (лоллардов).
  key: false
  name: 'Уиклиф: Писание выше папы'
  sources:
  - sannikov
  - needham3
1387:
  info: Братья общей жизни основывают монастырь августинских регулярных каноников в Виндесхейме — организационное ядро Devotio
    moderna.
  name: Основание Виндесхейма
  sources:
  - pravenc_devmod
1415:
  info: Ян Гус, осуждённый Констанцским собором, сожжён 6 июля 1415 г. вопреки императорской охранной грамоте; его казнь вызвала
    гуситские войны в Богемии.
  key: false
  name: Констанцский собор
  sources:
  - sannikov
  - needham3
1453:
  info: Османы взяли Константинополь — конец Византийской империи; греческие церкви оказались под властью султана, а Москва
    позднее осознала себя «Третьим Римом».
  key: true
  name: Падение Константинополя
  sources:
  - sannikov
  - needham3
1456:
  info: Иоганн Гутенберг печатает Библию подвижными литерами; книгопечатание станет важнейшим двигателем будущей Реформации.
  name: Библия Гутенберга
  sources:
  - sannikov
1516:
  info: Эразм Роттердамский издал первый печатный греческий Новый Завет (Novum Instrumentum), дав реформаторам доступ к оригиналу
    и обнажив неточности латинской Вульгаты.
  key: false
  name: Эразм издаёт греческий Новый Завет
  sources:
  - sannikov
  - needham3
1517:
  info: 31 октября 1517 г. Мартин Лютер обнародовал в Виттенберге 95 тезисов против торговли индульгенциями — символическое
    начало Реформации.
  key: true
  name: Лютер прибивает 95 тезисов — начало Реформации
  sources:
  - sannikov
  - needham3
1521:
  info: 'На Вормсском рейхстаге (1521) Лютер отказался отречься перед императором Карлом V: «На том стою и не могу иначе».
    Вормсский эдикт объявил его вне закона.'
  key: true
  name: 'Вормсский рейхстаг: «На том стою»'
  sources:
  - sannikov
  - needham3
  - macculloch
1525:
  info: 21 января 1525 г. в Цюрихе Конрад Гребель крестил Георга Блаурока — первое сознательное крещение по вере, «день рождения»
    анабаптизма. В тот же год — Крестьянская война в Германии (Томас Мюнцер).
  key: true
  name: Перекрещение в Цюрихе · Крестьянская война (Мюнцер)
  sources:
  - sannikov
  - needham3
  - macculloch
1526:
  info: Уильям Тиндейл издаёт первый печатный Новый Завет на английском языке с греческого — основа всех последующих английских
    переводов Библии.
  key: false
  name: 'Тиндейл: англ. Новый Завет'
  sources:
  - sannikov
  - needham3
1527:
  info: 'Шляйтхаймское исповедание (Михаэль Заттлер) — семь статей швейцарских братьев: крещение верующих, отлучение, Вечеря
    для крещёных, отделение от мира, отказ от меча и присяги.'
  key: false
  name: Шляйтхаймское исповедание (Заттлер)
  sources:
  - sannikov
  - needham3
1529:
  info: 'Марбургский диспут: Лютер и Цвингли согласились в 14 пунктах из 15, но разошлись о присутствии Христа в Вечере —
    раскол между лютеранами и реформатами.'
  key: false
  name: 'Марбургский диспут: Лютер ≠ Цвингли о Вечере'
  sources:
  - sannikov
  - needham3
1530:
  info: Аугсбургское исповедание (Меланхтон) — главный вероучительный документ лютеранства, представленный императору на рейхстаге
    в Аугсбурге.
  key: true
  name: Аугсбургское исповедание — символ лютеранства
  sources:
  - sannikov
  - needham3
  - macculloch
1534:
  info: «Акт о супрематии» провозгласил Генриха VIII главой Церкви Англии, отделив её от Рима по преимущественно династическим
    причинам.
  key: false
  name: Англия отделяется от Рима (Акт о супрематии)
  sources:
  - sannikov
  - needham3
1535:
  info: 'Падение Мюнстера: апокалиптическая теократия анабаптистов («Новый Иерусалим» Яна Лейденского) подавлена с жестокостью
    и надолго опозорила движение.'
  key: false
  name: Падение Мюнстера
  sources:
  - sannikov
  - needham3
1540:
  info: Папа Павел III буллой Regimini militantis Ecclesiae утвердил Общество Иисуса (иезуитов) Игнатия Лойолы — главный орден
    Контрреформации.
  key: false
  name: Папа утверждает орден иезуитов
  sources:
  - sannikov
  - needham3
1545:
  info: Открытие Тридентского собора (1545–1563) — ядра католической Контрреформации.
  key: false
  name: Открытие Тридентского собора
  sources:
  - sannikov
  - needham3
1555:
  info: 'Аугсбургский религиозный мир закрепил принцип cuius regio, eius religio («чья власть — того и вера»): князь определяет
    исповедание своих земель.'
  key: true
  name: 'Аугсбургский мир: «чья власть — того и вера»'
  sources:
  - sannikov
  - needham3
  - macculloch
1559:
  info: «Индекс запрещённых книг» (Index Librorum Prohibitorum) — список изданий, запрещённых Римско-католической церковью;
    инструмент борьбы с протестантской литературой.
  key: false
  name: «Индекс запрещённых книг»
  sources:
  - sannikov
  - needham3
1563:
  info: 'Тридентский собор завершился, оформив вероучение и реформы Контрреформации: Предание наравне с Писанием, семь таинств,
    отвержение оправдания только верой.'
  key: true
  name: Завершение Тридентского собора
  sources:
  - sannikov
  - needham3
  - macculloch
1572:
  info: В ночь на 24 августа 1572 г. (день св. Варфоломея) в Париже и по Франции были убиты тысячи гугенотов — кульминация
    религиозных войн.
  key: false
  name: Варфоломеевская ночь — резня гугенотов
  sources:
  - sannikov
  - needham3
1598:
  info: Нантский эдикт Генриха IV даровал гугенотам ограниченную свободу вероисповедания, завершив французские религиозные
    войны.
  key: false
  name: Нантский эдикт — права гугенотам
  sources:
  - sannikov
  - needham3
1605:
  info: Раковский катехизис — изложение учения социниан (антитринитариев) «Польских братьев»; предвестие позднейшего унитарианства.
  key: false
  name: Раковский катехизис социниан
  sources:
  - sannikov
  - needham3
1609:
  info: В Амстердаме Джон Смит крестил себя и свою общину по вере, основав первую баптистскую общину (под влиянием нидерландских
    меннонитов).
  key: false
  name: 'Джон Смит: первая баптистская община'
  sources:
  - sannikov
  - needham3
1611:
  info: Выходит «Авторизованная версия» (King James Version) — главный английский перевод Библии, определявший язык англоязычного
    протестантизма на три столетия.
  name: Библия короля Якова
  sources:
  - needham4
1619:
  info: Дортский синод (1618–1619) осудил арминиан и сформулировал «пять пунктов» кальвинизма (TULIP).
  key: false
  name: 'Синод в Дорте: 5 пунктов кальвинизма'
  sources:
  - sannikov
  - needham3
1620:
  info: Сепаратистская «Церковь Пилигримов» на корабле «Мэйфлауэр» основала колонию Плимут в Северной Америке.
  key: false
  name: Пилигримы на «Мэйфлауэр» → Плимут
  sources:
  - sannikov
  - needham3
1632:
  info: 'Дордрехтское исповедание нидерландских меннонитов закрепило анабаптистское учение: крещение по вере, отказ от насилия
    и присяги, церковная дисциплина.'
  key: false
  name: Дордрехтское исповедание меннонитов
  sources:
  - sannikov
  - needham3
1648:
  info: Вестфальский мир завершил Тридцатилетнюю войну, признав кальвинизм наравне с лютеранством и католичеством и закрепив
    конфессиональную карту Европы.
  key: true
  name: Вестфальский мир — конец религиозных войн
  sources:
  - sannikov
  - needham3
  - macculloch
1666:
  info: Большой Московский собор одобрил реформы патриарха Никона и осудил их противников; окончательное отделение старообрядцев.
  key: false
  name: Русский раскол · старообрядцы
  sources:
  - sannikov
  - needham3
1685:
  info: Отмена Нантского эдикта (эдикт Фонтенбло) вызвала массовый исход гугенотов из Франции.
  key: false
  name: Отмена Нантского эдикта — исход гугенотов
  sources:
  - sannikov
  - needham3
1689:
  info: Английский «Акт о веротерпимости» предоставил свободу богослужения протестантам-нонконформистам.
  key: false
  name: Акт о веротерпимости в Англии
  sources:
  - sannikov
  - needham3
1727:
  info: Духовное обновление в общине графа Цинцендорфа (Моравские братья) в Гернгуте дало начало протестантскому миссионерскому
    движению.
  name: Гернгутское пробуждение
  sources:
  - sannikov
1738:
  info: Обращение Джона Уэсли (под влиянием гернгутеров) положило начало методистскому пробуждению.
  key: false
  name: Обращение Дж. Уэсли — методистское пробуждение
  sources:
  - sannikov
  - needham3
1740:
  info: Пик евангельского возрождения в Британии и Северной Америке (Дж. Эдвардс, Дж. Уайтфилд, братья Уэсли) — массовые обращения,
    давшие импульс методизму.
  name: Великое пробуждение
  sources:
  - sannikov
  - needham4
1773:
  info: Папа Климент XIV под давлением католических монархий упразднил Общество Иисуса (восстановлено в 1814).
  name: Роспуск ордена иезуитов
  sources:
  - sannikov
1781:
  info: Император Иосиф II уравнял в правах протестантов и православных в католической Австрии — веяние Просвещения.
  name: Эдикт о веротерпимости Иосифа II
  sources:
  - sannikov
1789:
  info: Национализация церковных земель, «гражданское устройство духовенства» и кампания дехристианизации нанесли тяжёлый
    удар по католической Церкви.
  name: 'Французская революция: дехристианизация'
  sources:
  - sannikov
  - needham4
1793:
  info: Издание перевода прп. Паисия Величковского в Москве; импульс возрождения исихазма и старчества в русском монашестве.
  name: Славянское «Добротолюбие»
  sources:
  - pravenc_paisii
1814:
  info: Папа Пий VII восстановил Общество Иисуса на волне посленаполеоновской реставрации.
  name: Восстановление ордена иезуитов
  sources:
  - sannikov
1834:
  info: Крещение Иоганна Онкена в Гамбурге положило начало континентальному (немецкому) баптизму.
  key: false
  name: И. Онкен — континентальный баптизм
  sources:
  - sannikov
  - needham3
1845:
  info: Дж. Г. Ньюмен, лидер Оксфордского движения, обращается в католичество — кульминация англо-католического поворота в
    Англиканской церкви.
  name: Ньюмен переходит в католичество
  sources:
  - sannikov
1846:
  info: Митр. Амвросий восстановил полноту старообрядческой (поповской) иерархии в Белой Кринице.
  name: Белокриницкая иерархия
  sources:
  - pravenc_belokrin
1859:
  info: Выход книги Ч. Дарвина обострил спор науки и веры, питая будущий конфликт фундаментализма и модернизма.
  name: 'Дарвин: «Происхождение видов»'
  sources:
  - sannikov
1860:
  info: В колонии Молочна (юг России) обновленческое отделение образовало Mennonite Brethren — звено между меннонитами и русским
    баптизмом.
  name: Братские меннониты
  sources:
  - gameomb
1867:
  info: Никита Воронин принял крещение по вере в Тифлисе — начало баптизма в Российской империи.
  key: false
  name: Первое крещение по вере в России (Воронин)
  sources:
  - sannikov
  - needham3
1870:
  info: Провозгласил догмат о папской непогрешимости (ex cathedra); несогласные образовали старокатолическое движение.
  name: I Ватиканский собор
  sources:
  - pravenc_dollinger
1889:
  info: Утрехтская декларация старокатолических епископов (1889) объединила старокатолические церкви с утрехтской (янсенистской)
    кафедрой.
  name: Утрехтская уния
  sources:
  - azbyka_kerensky
1899:
  info: Около 7,5 тыс. духоборов при содействии Л. Н. Толстого и квакеров эмигрировали в Канаду.
  name: Переселение духоборов в Канаду
  sources:
  - pravdukhob
1905:
  info: Указ «Об укреплении начал веротерпимости» дал евангельским христианам и баптистам в России относительную свободу.
  key: false
  name: Указ о веротерпимости в России
  sources:
  - sannikov
  - needham3
1906:
  info: Пробуждение на Азуза-стрит в Лос-Анджелесе (У. Сеймур) с говорением на языках — начало мирового пятидесятнического
    движения.
  key: false
  name: Пятидесятническое пробуждение (Азуза-стрит)
  sources:
  - sannikov
  - needham3
1910:
  info: Съезд миссионерских обществ (1200 делегатов); под влиянием просьбы не переносить западные конфессиональные деления
    на миссионерские поля положил начало экуменическому движению. Вдохновитель — Дж. Мотт.
  name: Эдинбургская миссионерская конференция
  sources:
  - eb_protmiss
  - sannikov
1917:
  info: Поместный собор Русской церкви восстановил патриаршество (патриарх Тихон) накануне большевистских гонений.
  key: false
  name: Восстановление патриаршества в России
  sources:
  - sannikov
  - needham3
1922:
  info: Высылка из Советской России Бердяева, Франка, Н. Лосского и др. религиозных мыслителей — начало интеллектуальной диаспоры.
  name: «Философский пароход»
  sources:
  - rsxd_pravenc
1925:
  info: Суд в Дейтоне (США) над учителем за преподавание эволюции обострил конфликт фундаменталистов и модернистов в американском
    протестантизме.
  name: «Обезьяний процесс» Скоупса
  sources:
  - sannikov
1927:
  info: 'Послание о лояльности Церкви советской власти вызвало раскол: непоминающие, иосифляне, катакомбная церковь.'
  name: Декларация митрополита Сергия
  sources:
  - declaration_pravenc
1934:
  info: Принята первым синодом Исповеднической церкви в Бармене (1934); шесть статей против лжеучения «немецких христиан».
  name: Барменская декларация
  sources:
  - pravenc_barmen
1944:
  info: Образован Всесоюзный совет евангельских христиан-баптистов (ВСЕХБ).
  key: false
  name: Образование ВСЕХБ
  sources:
  - sannikov
  - needham3
1948:
  info: В Амстердаме учреждён Всемирный совет церквей (ВСЦ) — центральный институт экуменического движения XX века.
  key: false
  name: Всемирный совет церквей
  sources:
  - sannikov
  - needham3
1953:
  info: III Церковно-народный собор в Софии (1953) вновь провозгласил Болгарскую церковь патриархатом.
  name: Восстановление Болгарского патриаршества
  sources:
  - pravlife_bolg
1961:
  info: «Инициативное» движение привело к расколу и образованию Совета Церквей ЕХБ (позже МСЦ ЕХБ).
  key: false
  name: 'Раскол: Совет Церквей ЕХБ'
  sources:
  - sannikov
  - needham3
1962:
  info: 'Иоанн XXIII открыл Второй Ватиканский собор (1962–1965) — крупнейшее обновление католичества: богослужение на родных
    языках, поворот к экуменизму и современному миру.'
  key: false
  name: II Ватиканский собор
  sources:
  - sannikov
  - needham3
1965:
  info: 'Окончание собора: реформа богослужения (мессы на родных языках), декларации о религиозной свободе и об отношении
    к нехристианским религиям.'
  name: Завершение II Ватиканского собора
  sources:
  - sannikov
1970:
  info: Московский патриархат дарует автокефалию OCA.
  name: Автокефалия Православной Церкви в Америке
  sources:
  - oca_pravenc
1988:
  info: Празднование 1000-летия Крещения Руси стало поворотом к религиозному возрождению и концу государственного атеизма
    в СССР.
  key: false
  name: 1000-летие Крещения Руси
  sources:
  - sannikov
  - needham3
1991:
  info: 'Конец государственного атеизма принёс свободу вероисповедания: массовое возрождение церквей и приход миссий на постсоветское
    пространство.'
  name: 'Распад СССР: религиозная свобода'
  sources:
  - sannikov
